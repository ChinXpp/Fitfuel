<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FitFuel – Health Tracking Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {--lime:#C8F000;--lime-dark:#a8cc00;--gold:#FFD700;--black:#0A0A0A;--dark:#111214;--card:#1A1C1F;--card2:#222428;--border:#2A2D32;--muted:#555A62;--text:#E8EBF0;--text2:#9BA3AF;--red:#FF4757;--orange:#FF8C42;--teal:#2DD4BF;--blue:#3B82F6;--purple:#A78BFA;--aqua:#38bdf8;--radius:16px;--radius-sm:10px}
  * {margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body {max-width:100%;overflow-x:hidden}
  body {font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh}
  .screen {display:none;min-height:100vh;flex-direction:column;animation:fadeIn .3s ease}
  .screen.active {display:flex}
  @keyframes fadeIn {from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)}}
  .splash-logo {text-align:center;padding:24px}
  .splash-logo .icon {font-size:72px;margin-bottom:12px;display:block}
  .splash-logo h1 {font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:4px;color:var(--lime);line-height:1}
  .splash-btns {margin-top:60px;display:flex;flex-direction:column;gap:12px;width:290px;margin:60px auto 0}
  .auth-wrap {max-width:420px;width:100%;margin:0 auto;padding:40px 24px 60px}
  .auth-header {margin-bottom:28px;text-align:center}
  .auth-header h2 {font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;color:var(--lime)}
  .btn {border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:var(--radius-sm);transition:all .18s ease;letter-spacing:.3px}
  .btn-primary {background:var(--lime);color:var(--black);padding:16px 24px;font-size:15px;width:100%}
  .btn-primary:hover {background:var(--lime-dark);transform:translateY(-1px)}
  .btn-primary:disabled {opacity:.5;cursor:not-allowed;transform:none}
  .btn-sm {background:var(--lime);color:var(--black);padding:9px 16px;font-size:12px;border-radius:8px;cursor:pointer;border:none;font-weight:600;font-family:'DM Sans'}
  .btn-danger {background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3);padding:10px 20px;font-size:13px;border-radius:8px;cursor:pointer;font-weight:600}
  .btn-export {background:rgba(45,212,191,.15);color:var(--teal);border:1px solid rgba(45,212,191,.3);padding:10px 16px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:600}
  .form-group {margin-bottom:14px;width:100%}
  .form-group label {display:block;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
  .form-group input, .form-group select {width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:13px 16px;border-radius:var(--radius-sm);font-size:15px;box-sizing:border-box;max-width:100%}
  .form-group input[type=date], .form-group input[type=time] {font-family:'JetBrains Mono',monospace;text-align:left;padding:12px;font-size:14px;min-height:46px;width:100%;appearance:none;-webkit-appearance:none;position:relative}
  .form-group input[type=date]::-webkit-calendar-picker-indicator,
  .form-group input[type=time]::-webkit-calendar-picker-indicator {filter:invert(1) opacity(.6);cursor:pointer;padding:4px;flex-shrink:0}
  @media(max-width:380px){.form-group input[type=date], .form-group input[type=time]{font-size:13px;padding:12px 8px}}
  .form-group input:focus, .form-group select:focus {outline:none;border-color:var(--lime)}
  .form-row {display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .error-msg {color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px}
  .field-hint {font-size:11px;color:var(--text2);margin-top:5px}
  .pin-wrap {display:flex;gap:8px;justify-content:center;margin:8px 0;max-width:100%}
  .pin-box {width:44px;height:54px;text-align:center;font-size:22px;font-weight:600;background:var(--card);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono'}
  .pin-box:focus {outline:none;border-color:var(--lime);transform:scale(1.05)}
  .pin-box.filled {border-color:var(--lime)}
  .topbar {display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--dark);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .topbar-logo {font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--lime)}
  .avatar {width:36px;height:36px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--black);cursor:pointer;background-size:cover;background-position:center}
  .avatar.admin {background:var(--blue);color:white}
  .avatar.master {background:var(--gold);color:var(--black)}
  .role-badge {font-size:9px;padding:3px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;background:rgba(200,240,0,.15);color:var(--lime);border:1px solid rgba(200,240,0,.3)}
  .role-admin {background:rgba(59,130,246,.15);color:var(--blue);border-color:rgba(59,130,246,.3)}
  .role-master {background:rgba(255,215,0,.15);color:var(--gold);border-color:rgba(255,215,0,.3)}
  .mode-switch {background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(255,215,0,.04));border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .mode-btn {padding:8px 14px;font-size:12px;border-radius:8px;font-weight:600;cursor:pointer;border:none}
  .mode-btn-admin {background:var(--blue);color:white}
  .mode-btn-master {background:var(--gold);color:var(--black)}
  .content {flex:1;overflow-y:auto;padding:20px;padding-bottom:100px}
  .bottom-nav {position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100}
  .nav-item {flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;background:none;border:none}
  .nav-item.active {color:var(--lime)}
  .card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .card-sm {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
  .settings-list {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
  .setting-item {padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;border-bottom:1px solid var(--border)}
  .setting-item:hover {background:var(--card2)}
  .setting-item:last-child {border-bottom:none}
  .setting-icon {width:36px;height:36px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px}
  .setting-content {flex:1;min-width:0}
  .setting-title {font-size:14px;font-weight:600;margin-bottom:2px}
  .setting-desc {font-size:12px;color:var(--text2)}

  .metrics-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .metric-chip {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
  .metric-chip::before {content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.07}
  .metric-chip.lime::before {background:var(--lime)} .metric-chip.teal::before {background:var(--teal)}
  .metric-chip.orange::before {background:var(--orange)} .metric-chip.blue::before {background:var(--blue)}
  .metric-chip.purple::before {background:var(--purple)} .metric-chip.aqua::before {background:var(--aqua)}
  .metric-chip .chip-label {font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px}
  .metric-chip .chip-value {font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1}
  .metric-chip .chip-unit {font-size:12px;color:var(--text2);margin-top:2px}
  .metric-chip.lime .chip-value{color:var(--lime)} .metric-chip.teal .chip-value{color:var(--teal)}
  .metric-chip.orange .chip-value{color:var(--orange)} .metric-chip.blue .chip-value{color:var(--blue)}
  .metric-chip.purple .chip-value{color:var(--purple)} .metric-chip.aqua .chip-value{color:var(--aqua)}

  .score-mini-stats {display:flex;align-items:center;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(200,240,0,.15);font-size:12px;flex-wrap:wrap}
  .score-mini-stat {display:flex;align-items:center;gap:5px;color:var(--text2)}
  .score-mini-stat b {color:var(--text);font-weight:600;font-family:'JetBrains Mono'}

  .bmi-card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
  .bmi-number {font-family:'Bebas Neue';font-size:80px;line-height:1}
  .bmi-bar {background:var(--border);border-radius:6px;height:10px;position:relative;margin:16px 0 8px}
  .bmi-indicator {position:absolute;top:-4px;width:18px;height:18px;border-radius:50%;background:white;border:3px solid var(--black);transform:translateX(-50%);box-shadow:0 0 0 2px white}
  .progress-card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .progress-bar {background:var(--border);height:8px;border-radius:4px;overflow:hidden;margin:8px 0}
  .progress-bar-fill {height:100%;border-radius:4px}
  .progress-row {display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .streak-box {background:linear-gradient(135deg,rgba(255,140,66,.12),rgba(255,71,87,.06));border:1px solid rgba(255,140,66,.3);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
  .streak-num {font-family:'Bebas Neue';font-size:42px;color:var(--orange);line-height:1}
  .risk-badge {display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
  .risk-low {background:rgba(200,240,0,.15);color:var(--lime);border:1px solid rgba(200,240,0,.3)}
  .risk-medium {background:rgba(255,140,66,.15);color:var(--orange);border:1px solid rgba(255,140,66,.3)}
  .risk-high {background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3)}
  .rec-box {border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;border-left:3px solid}
  .rec-box.low {background:rgba(200,240,0,.08);border-color:var(--lime)}
  .rec-box.medium {background:rgba(255,140,66,.08);border-color:var(--orange)}
  .rec-box.high {background:rgba(255,71,87,.08);border-color:var(--red)}
  .rec-box p {font-size:13px;line-height:1.6}
  .rec-box .rec-label {font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
  .rec-box.low .rec-label{color:var(--lime)} .rec-box.medium .rec-label{color:var(--orange)} .rec-box.high .rec-label{color:var(--red)}
  .rec-action {font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-style:italic}
  .log-item {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px}
  .log-stats {display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
  .log-stat {font-size:12px;color:var(--text2)}
  .log-stat span {color:var(--text);font-weight:600}
  .activity-item {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
  .activity-icon {width:32px;height:32px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
  .activity-time {font-size:11px;color:var(--text2);margin-top:3px;font-family:'JetBrains Mono'}
  .section-title {font-family:'Bebas Neue';font-size:24px;letter-spacing:1px;color:var(--lime);margin-bottom:16px}
  .section-sub {font-size:12px;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
  .section-flex {display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px}

  /* Weight Chart */
  .chart-card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px 12px;margin-bottom:16px}
  .chart-card .chart-head {display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
  .chart-card canvas {display:block;width:100%;height:200px}

  /* Weekly Summary */
  .summary-card {background:linear-gradient(135deg,rgba(200,240,0,.05),rgba(45,212,191,.03));border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  .summary-grid {display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .summary-stat {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
  .summary-stat .ss-label {font-size:10px;color:var(--text2);text-transform:uppercase;margin-bottom:4px;letter-spacing:.5px}
  .summary-stat .ss-value {font-family:'Bebas Neue';font-size:26px;line-height:1;color:var(--text)}
  .summary-stat .ss-delta {font-size:11px;font-family:'JetBrains Mono';margin-top:3px}
  .summary-stat .ss-delta.up {color:var(--orange)} .summary-stat .ss-delta.down {color:var(--lime)}
  .summary-stat .ss-delta.neutral {color:var(--text2)}
  .summary-stat .ss-unit {font-size:11px;color:var(--text2)}

  /* Reminder Toggle */
  .toggle-switch {position:relative;display:inline-block;width:48px;height:26px;flex-shrink:0}
  .toggle-switch input {opacity:0;width:0;height:0}
  .toggle-slider {position:absolute;cursor:pointer;inset:0;background:var(--card2);border:1px solid var(--border);border-radius:26px;transition:.3s}
  .toggle-slider:before {position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:var(--text2);border-radius:50%;transition:.3s}
  .toggle-switch input:checked + .toggle-slider {background:rgba(200,240,0,.2);border-color:var(--lime)}
  .toggle-switch input:checked + .toggle-slider:before {transform:translateX(22px);background:var(--lime)}

  .energy-slider-box {margin-top:8px}
  .energy-slider {width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:linear-gradient(90deg,var(--red) 0%,var(--orange) 30%,var(--lime) 60%,var(--teal) 100%);outline:none}
  .energy-slider::-webkit-slider-thumb {-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--text);cursor:pointer;border:3px solid var(--card);box-shadow:0 0 0 1px var(--border)}
  .energy-slider::-moz-range-thumb {width:24px;height:24px;border-radius:50%;background:var(--text);cursor:pointer;border:3px solid var(--card)}
  .energy-display {display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--text2)}
  .energy-value {font-family:'Bebas Neue';font-size:28px;color:var(--lime);line-height:1}
  .energy-label-text {font-size:13px;font-weight:600}
  .energy-info {background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-radius:var(--radius-sm);padding:10px 14px;margin-top:10px;font-size:12px;color:var(--text2);line-height:1.5}
  .energy-info b {color:var(--purple)}

  .spinner {display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin {to {transform:rotate(360deg)}}
  .toast {position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--lime);color:var(--black);padding:12px 24px;border-radius:30px;font-weight:600;font-size:14px;opacity:0;transition:all .3s ease;z-index:9999;white-space:nowrap;max-width:88vw;text-align:center;pointer-events:none}
  .toast.show {opacity:1;transform:translateX(-50%) translateY(0)}
  .profile-header {display:flex;align-items:center;gap:16px;margin-bottom:24px}
  .profile-avatar-lg {width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--teal));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--black);flex-shrink:0;background-size:cover;background-position:center;position:relative;overflow:hidden;cursor:pointer;border:3px solid var(--border)}
  .profile-avatar-lg.admin {background:linear-gradient(135deg,var(--blue),var(--purple));color:white}
  .profile-avatar-lg.master {background:linear-gradient(135deg,var(--gold),var(--orange));color:var(--black)}
  .profile-avatar-lg .photo-edit-overlay {position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:18px;color:white}
  .profile-avatar-lg:hover .photo-edit-overlay {opacity:1}
  .photo-input {display:none}
  .subpage-header {display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .subpage-back {background:var(--card);border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .flex-between {display:flex;justify-content:space-between;align-items:center}
  .text-muted {color:var(--text2);font-size:13px}
  .fw-600 {font-weight:600}
  .mono {font-family:'JetBrains Mono',monospace}
  .empty-state {text-align:center;padding:40px 20px;color:var(--text2)}
  .empty-state .empty-icon {font-size:48px;margin-bottom:12px;display:block}

  /* Cropper */
  .cropper-overlay {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9998;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
  .cropper-overlay.show {display:flex}
  .cropper-modal {background:var(--dark);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:380px;max-height:95vh;overflow-y:auto}
  .cropper-modal h3 {font-family:'Bebas Neue';font-size:24px;letter-spacing:1px;color:var(--lime);margin-bottom:16px;text-align:center}
  .cropper-stage {position:relative;width:100%;aspect-ratio:1/1;background:#000;border-radius:var(--radius-sm);overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none}
  .cropper-stage:active{cursor:grabbing}
  .cropper-stage img {position:absolute;top:50%;left:50%;transform-origin:center center;pointer-events:none;user-select:none;-webkit-user-drag:none;max-width:none;opacity:0;transition:opacity .2s ease}
  .cropper-stage img.ready {opacity:1}
  .cropper-circle {position:absolute;inset:0;pointer-events:none}
  .cropper-circle::before {content:'';position:absolute;inset:0;background:rgba(0,0,0,.5);-webkit-mask:radial-gradient(circle at center,transparent 49.5%,black 50%);mask:radial-gradient(circle at center,transparent 49.5%,black 50%)}
  .cropper-circle::after {content:'';position:absolute;top:50%;left:50%;width:100%;height:100%;border-radius:50%;border:2px solid white;transform:translate(-50%,-50%);box-shadow:0 0 0 1px rgba(0,0,0,.5)}
  .cropper-zoom-row {display:flex;align-items:center;gap:12px;margin:18px 0 8px}
  .cropper-zoom-icon {font-size:14px;color:var(--text2);flex-shrink:0}
  .cropper-zoom-icon.big {font-size:20px}
  .cropper-zoom-slider {flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none}
  .cropper-zoom-slider::-webkit-slider-thumb {-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--card)}
  .cropper-zoom-slider::-moz-range-thumb {width:20px;height:20px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--card)}
  .cropper-actions {display:flex;gap:10px;margin-top:16px}
  .cropper-btn {flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans';font-weight:600;font-size:14px;cursor:pointer}
  .cropper-btn-cancel {background:var(--card2);color:var(--text)}
  .cropper-btn-apply {background:var(--lime);color:var(--black)}
  .cropper-btn-reset {background:transparent;color:var(--text2);text-decoration:underline;border:none;font-size:12px;cursor:pointer;margin-top:4px;width:100%;text-align:center;padding:6px}

  #global-loader {display:flex;position:fixed;inset:0;background:var(--black);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
  @media(max-width:400px){.metrics-grid,.form-row,.summary-grid{grid-template-columns:1fr} .pin-box{width:40px;height:50px;font-size:18px} .content{padding:16px;padding-bottom:100px}}
</style>
</head>
<body>

<div id="global-loader">
  <div class="spinner" style="width:30px;height:30px;border-width:3px;border-top-color:var(--lime)"></div>

<script>
const SUPABASE_URL='https://gyaptfiwxvruiorczbxv.supabase.co';
const SUPABASE_KEY='sb_publishable_phEtg4XZtjlbcz-xOz0Tjw_o-cQUJkf';
const supaClient=window.supabase?window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY):null;
let USERS=[],LOGS=[],ACTIVITIES=[],RECOMMENDATIONS=[];
let currentUser=null,currentUserAuth=null,currentView='user',currentPage='home';

const mapUser=u=>!u?null:{id:u.id,name:u.name,email:u.email,age:u.age,gender:u.gender,height:u.height,targetWeight:u.target_weight,goalType:u.goal_type,sleepTarget:u.sleep_target,weeklyExerciseTarget:u.weekly_exercise_target,role:u.role,photo:u.photo,createdAt:u.created_at};
const mapLog=l=>({id:l.id,userId:l.user_id,date:l.date,weight:l.weight,sleep:l.sleep_hours,water:l.water_liters,exercise:l.exercise_minute,energyLevel:l.energy_level,createdAt:l.created_at});
const mapRec=r=>({id:r.id,logId:r.log_id,rectype:r.rectype,severity:r.severity,message:r.message,action:r.action,icon:r.icon,createdAt:r.created_at});
const mapAct=a=>({id:a.id,type:a.type,target:a.target,userId:a.user_id,actorId:a.actor_id,actorName:a.actor_name,msg:a.msg,timestamp:a.created_at});

async function loadAllData(){
  if(!supaClient)return;
  const[uRes,lRes,rRes,aRes]=await Promise.all([
    supaClient.from('users').select('*'),
    supaClient.from('daily_logs').select('*'),
    supaClient.from('recommendations').select('*'),
    supaClient.from('activities').select('*').order('created_at',{ascending:false}).limit(200)
  ]);
  if(uRes.data)USERS=uRes.data.map(mapUser);
  if(lRes.data)LOGS=lRes.data.map(mapLog);
  if(rRes.data)RECOMMENDATIONS=rRes.data.map(mapRec);
  if(aRes.data)ACTIVITIES=aRes.data.map(mapAct);
}

window.onload=async()=>{
  try{
    if(!supaClient){document.getElementById('global-loader').style.display='none';showScreen('splash');return;}
    const{data:{session}}=await supaClient.auth.getSession();
    if(session)await handleSession(session.user);
    else{document.getElementById('global-loader').style.display='none';showScreen('splash');}
  }catch(err){console.error("Startup Error:",err);document.getElementById('global-loader').style.display='none';showScreen('splash');}
};

function setupPinInputs(id){
  const c=document.getElementById(id);if(!c)return;
  const inputs=c.querySelectorAll('.pin-box');
  inputs.forEach((inp,i)=>{
    inp.oninput=e=>{const v=e.target.value.replace(/[^0-9]/g,'');e.target.value=v;if(v)e.target.classList.add('filled');else e.target.classList.remove('filled');if(v&&i<inputs.length-1)inputs[i+1].focus();};
    inp.onkeydown=e=>{if(e.key==='Backspace'&&!e.target.value&&i>0){inputs[i-1].focus();inputs[i-1].value='';inputs[i-1].classList.remove('filled');}};
    inp.onpaste=e=>{e.preventDefault();const txt=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);txt.split('').forEach((c,j)=>{if(inputs[j]){inputs[j].value=c;inputs[j].classList.add('filled');}});if(inputs[Math.min(txt.length,inputs.length-1)])inputs[Math.min(txt.length,inputs.length-1)].focus();};
  });
}
const getPinValue=id=>{const c=document.getElementById(id);return c?Array.from(c.querySelectorAll('.pin-box')).map(i=>i.value).join(''):'';};
const clearPinInputs=id=>{const c=document.getElementById(id);if(c)c.querySelectorAll('.pin-box').forEach(i=>{i.value='';i.classList.remove('filled');});};
setupPinInputs('otp-input-wrap');

async function sendAuthOTP(){
  const email=document.getElementById('auth-email').value.trim().toLowerCase();
  const err=document.getElementById('auth-error');const btn=document.getElementById('btn-send-otp');
  err.textContent='';
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='กรุณากรอกอีเมลให้ถูกต้อง';return;}
  btn.innerHTML='<span class="spinner"></span> กำลังส่ง OTP...';btn.disabled=true;
  const{error}=await supaClient.auth.signInWithOtp({email});
  if(error){err.textContent='เกิดข้อผิดพลาด: '+error.message;btn.innerHTML='ส่งรหัส OTP ทางอีเมล';btn.disabled=false;}
  else{document.getElementById('display-email').textContent=email;btn.innerHTML='ส่งรหัส OTP ทางอีเมล';btn.disabled=false;clearPinInputs('otp-input-wrap');document.getElementById('verify-error').textContent='';showScreen('verify-otp');setTimeout(()=>document.querySelector('#otp-input-wrap .pin-box').focus(),100);}
}
async function verifyAuthOTP(){
  const email=document.getElementById('auth-email').value.trim().toLowerCase();
  const token=getPinValue('otp-input-wrap');
  const err=document.getElementById('verify-error');const btn=document.getElementById('btn-verify-otp');
  if(token.length!==6){err.textContent='กรุณากรอก OTP 6 หลัก';return;}
  btn.innerHTML='<span class="spinner"></span> กำลังตรวจสอบ...';btn.disabled=true;
  const{data:{user},error}=await supaClient.auth.verifyOtp({email,token,type:'email'});
  if(error){err.textContent='❌ รหัส OTP ไม่ถูกต้องหรือหมดอายุ';btn.innerHTML='🔐 ยืนยันและเข้าสู่ระบบ';btn.disabled=false;}
  else{await handleSession(user);btn.innerHTML='🔐 ยืนยันและเข้าสู่ระบบ';btn.disabled=false;}
}
async function handleSession(authUser){
  document.getElementById('global-loader').style.display='flex';
  currentUserAuth=authUser;
  const{data:profile}=await supaClient.from('users').select('*').eq('id',authUser.id).single();
  if(profile){currentUser=mapUser(profile);await loadAllData();document.getElementById('global-loader').style.display='none';enterApp();}
  else{document.getElementById('global-loader').style.display='none';showScreen('onboarding');}
}
async function submitOnboarding(){
  const name=document.getElementById('ob-name').value.trim();
  const age=parseInt(document.getElementById('ob-age').value);
  const gender=document.getElementById('ob-gender').value;
  const height=parseInt(document.getElementById('ob-height').value);
  const target=parseFloat(document.getElementById('ob-target').value);
  const goal=document.getElementById('ob-goal').value;
  const sleepTarget=parseFloat(document.getElementById('ob-sleep').value);
  const exTarget=parseInt(document.getElementById('ob-ex').value);
  const err=document.getElementById('ob-error');const btn=document.getElementById('btn-save-ob');
  if(!name||!age||!gender||!height||!target||!goal||!sleepTarget||!exTarget){err.textContent='กรุณากรอกให้ครบทุกช่อง';return;}
  if(age<10||age>100){err.textContent='อายุไม่ถูกต้อง';return;}
  if(height<100||height>250){err.textContent='ส่วนสูงไม่ถูกต้อง';return;}
  if(target<20||target>300){err.textContent='น้ำหนักเป้าหมายไม่ถูกต้อง';return;}
  err.textContent='';btn.innerHTML='<span class="spinner"></span> กำลังสร้างโปรไฟล์...';btn.disabled=true;
  const{count}=await supaClient.from('users').select('*',{count:'exact',head:true});
  const assignRole=count===0?'master':'user';
  const dbUser={id:currentUserAuth.id,name,email:currentUserAuth.email,age,gender,height,target_weight:target,goal_type:goal,sleep_target:sleepTarget,weekly_exercise_target:exTarget,role:assignRole};
  const{data,error}=await supaClient.from('users').insert([dbUser]).select().single();
  if(error){err.textContent='เกิดข้อผิดพลาด: '+error.message;btn.innerHTML='🎉 บันทึกและเริ่มใช้งาน';btn.disabled=false;return;}
  currentUser=mapUser(data);await loadAllData();
  await logActivity('create',`สร้างบัญชีใหม่: ${currentUser.name} (${assignRole})`,currentUser.id,'user');
  showToast('🎉 ยินดีต้อนรับ '+currentUser.name.split(' ')[0]+'!');
  enterApp();
}
async function logout(){
  document.getElementById('global-loader').style.display='flex';
  stopReminderTimer();
  await supaClient.auth.signOut();
  currentUser=null;currentUserAuth=null;currentView='user';
  document.getElementById('global-loader').style.display='none';
  showScreen('splash');
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}
function enterApp(){
  updateAvatar();
  const role=currentUser.role;
  document.getElementById('topbar-role').className='role-badge role-'+role;
  document.getElementById('topbar-role').textContent=role.toUpperCase();
  initReminders();
  renderApp('home');
  showScreen('main');
}
function updateAvatar(){
  const av=document.getElementById('user-avatar');
  av.className='avatar '+(currentUser.role==='master'?'master':currentUser.role==='admin'?'admin':'');
  if(currentUser.photo){av.style.backgroundImage=`url("${currentUser.photo}")`;av.textContent='';}
  else{av.style.backgroundImage='';av.textContent=currentUser.name[0];}
}
async function logActivity(type,msg,userId=null,target='log'){
  if(!supaClient||!currentUser)return;
  const{data}=await supaClient.from('activities').insert([{type,target,user_id:userId,actor_id:currentUser.id,actor_name:currentUser.name,msg}]).select().single();
  if(data)ACTIVITIES.unshift(mapAct(data));
}

// ═════ CALCULATIONS ═════
const calcBMI=(w,h)=>w/Math.pow(h/100,2);
function bmiCategory(bmi){
  if(bmi<18.5)return{label:'น้ำหนักน้อย',color:'#3B82F6',risk:'low'};
  if(bmi<25)return{label:'น้ำหนักปกติ',color:'#C8F000',risk:'low'};
  if(bmi<30)return{label:'น้ำหนักเกิน',color:'#FF8C42',risk:'medium'};
  return{label:'โรคอ้วน',color:'#FF4757',risk:'high'};
}
function calcHealthScore(log,user){
  let s=100;const bmi=calcBMI(log.weight,user.height);
  if(bmi<18.5||bmi>=30)s-=25;else if(bmi>=25)s-=15;
  if(log.sleep<6)s-=20;else if(log.sleep<7)s-=10;
  if(log.water<1.5)s-=20;else if(log.water<2)s-=10;
  if(log.exercise<15)s-=20;else if(log.exercise<30)s-=10;
  return Math.max(0,s);
}
function energyInfo(level){
  if(level<=3)return{label:'พลังงานต่ำ',emoji:'😴',color:'#FF4757',advice:'ควรพักผ่อน เพิ่มการนอน หรือทบทวนความเครียด'};
  if(level<=6)return{label:'พลังงานปานกลาง',emoji:'😐',color:'#FF8C42',advice:'พลังงานปกติ ลองเพิ่มกิจกรรมเบาๆ'};
  if(level<=8)return{label:'พลังงานดี',emoji:'😊',color:'#C8F000',advice:'รักษาวินัยปัจจุบันต่อไป'};
  return{label:'พลังงานเต็มเปี่ยม',emoji:'🔥',color:'#2DD4BF',advice:'สุดยอด! เป็นโอกาสดีในการ workout หนักๆ'};
}
function generateRecommendations(log,user,history=[]){
  const recs=[];const bmi=calcBMI(log.weight,user.height);const cat=bmiCategory(bmi);
  if(cat.risk==='high')recs.push({severity:'high',icon:'⚠',title:'BMI โรคอ้วน',msg:'BMI '+bmi.toFixed(1)+' อยู่ในระดับโรคอ้วน',action:'ลดน้ำหนัก 0.5–1 kg/สัปดาห์ ลดแคลอรี่ 500 kcal/วัน + ออกกำลังกาย 150 นาที/สัปดาห์'});
  else if(cat.risk==='medium')recs.push({severity:'medium',icon:'💡',title:'น้ำหนักเกิน',msg:'BMI '+bmi.toFixed(1)+' เกินมาตรฐาน',action:'ลดของหวาน เครื่องดื่มน้ำตาลสูง เดิน 30 นาทีหลังอาหาร'});
  else if(bmi<18.5)recs.push({severity:'medium',icon:'💡',title:'น้ำหนักน้อย',msg:'BMI '+bmi.toFixed(1)+' ต่ำกว่ามาตรฐาน',action:'เพิ่มแคลอรี่จากโปรตีน 1.6–2 g/kg + ฝึกเวท'});
  if(log.sleep<(user.sleepTarget||7))recs.push({severity:'high',icon:'⚠',title:'นอนน้อยเกินไป',msg:'นอนเพียง '+log.sleep+' ชม. (เป้าหมาย: '+(user.sleepTarget||7)+' ชม.)',action:'ปิดมือถือก่อนนอน 1 ชม. นอนตื่นเวลาเดียวกันทุกวัน'});
  if(log.water<1.5)recs.push({severity:'high',icon:'⚠',title:'ดื่มน้ำน้อยมาก',msg:'ดื่ม '+log.water+' L',action:'พกขวด 1L ติดตัว ดื่มทุก 2 ชม.'});
  else if(log.water<2)recs.push({severity:'medium',icon:'💡',title:'ควรดื่มน้ำเพิ่ม',msg:'ดื่ม '+log.water+' L',action:'ตั้งเตือนทุก 2 ชม.'});
  const targetExDaily=user.weeklyExerciseTarget?Math.round(user.weeklyExerciseTarget/7):30;
  if(log.exercise<targetExDaily/2)recs.push({severity:'high',icon:'⚠',title:'ออกกำลังกายน้อยไป',msg:'วันนี้ออกกำลังกาย '+log.exercise+' นาที (เป้าเฉลี่ย: '+targetExDaily+' นาที/วัน)',action:'เริ่มเดินเร็ว 20 นาที หรือ HIIT 10 นาที'});
  else if(log.exercise<targetExDaily)recs.push({severity:'medium',icon:'💡',title:'ออกกำลังกายยังไม่ถึงเป้า',msg:'ออกกำลังกาย '+log.exercise+' นาที',action:'เพิ่มความเข้มข้นอีกนิด'});
  if(log.energyLevel){
    if(log.energyLevel<=3){
      if(log.exercise>=60)recs.push({severity:'high',icon:'⚠',title:'พลังงานต่ำ + ออกกำลังกายหนัก',msg:'พลังงาน '+log.energyLevel+'/10 + ออกกำลังกาย '+log.exercise+' นาที อาจเข้าข่าย Overtraining',action:'พักผ่อน 1-2 วัน เพิ่มการนอนและโภชนาการ'});
      else if(log.sleep<7)recs.push({severity:'high',icon:'😴',title:'พลังงานต่ำ',msg:'พลังงาน '+log.energyLevel+'/10 น่าจะเป็นเพราะนอนน้อย',action:'นอนให้ครบ 7-9 ชม. + ดื่มน้ำเปล่ามากๆ + งดคาเฟอีนช่วงบ่าย'});
      else recs.push({severity:'medium',icon:'😴',title:'พลังงานต่ำผิดปกติ',msg:'พลังงาน '+log.energyLevel+'/10 ทั้งที่นอนพอ',action:'อาจมีความเครียด ขาดธาตุเหล็ก หรือสารอาหาร — ลองตรวจสุขภาพ'});
    }else if(log.energyLevel>=8&&log.exercise<targetExDaily/2)recs.push({severity:'low',icon:'🔥',title:'พลังงานดีเยี่ยม!',msg:'พลังงาน '+log.energyLevel+'/10 แต่ออกกำลังกายแค่ '+log.exercise+' นาที',action:'เป็นโอกาสดี! เพิ่มความเข้มข้นการออกกำลังกายได้เลย'});
  }
  if(history.length>=3){
    const r3=history.slice(0,3);const trend=r3[0].weight-r3[r3.length-1].weight;
    if(user.goalType==='ลดน้ำหนัก'&&trend>0)recs.push({severity:'medium',icon:'📉',title:'น้ำหนักขึ้น',msg:'3 วันล่าสุดน้ำหนักเพิ่ม '+trend.toFixed(1)+' kg',action:'ทบทวนอาหาร ลดของแปรรูปและน้ำตาล'});
    else if(user.goalType==='ลดน้ำหนัก'&&trend<-0.5)recs.push({severity:'low',icon:'🎉',title:'ความคืบหน้าดี!',msg:'น้ำหนักลด '+Math.abs(trend).toFixed(1)+' kg',action:'ระวังอย่าลดเร็วเกิน (ไม่ควรเกิน 1 kg/สัปดาห์)'});
  }
  if(recs.length===0)recs.push({severity:'low',icon:'🎉',title:'ทำได้ดีมาก!',msg:'สุขภาพอยู่ในเกณฑ์ดีเยี่ยม',action:'ความสม่ำเสมอคือกุญแจสำคัญ'});
  return recs;
}
function calcProgress(user){
  const logs=LOGS.filter(l=>l.userId===user.id).sort((a,b)=>a.date.localeCompare(b.date));
  if(!logs.length)return null;
  const first=logs[0],latest=logs[logs.length-1];
  const startW=first.weight,curW=latest.weight,targetW=user.targetWeight||curW;
  const td=Math.abs(targetW-startW),cd=Math.abs(targetW-curW);
  const weightPct=td>0?Math.min(100,Math.max(0,((td-cd)/td)*100)):100;
  let streak=1;
  const dates=logs.map(l=>l.date).reverse();
  let lastD=new Date(dates[0]);
  for(let i=1;i<dates.length;i++){const d=new Date(dates[i]);if(Math.round((lastD-d)/(1000*60*60*24))===1){streak++;lastD=d;}else break;}
  const recent=logs.slice(-7);
  const energyLogs=recent.filter(l=>l.energyLevel!=null);
  return{
    startWeight:startW,currentWeight:curW,targetWeight:targetW,weightPct:weightPct.toFixed(0),
    weightDelta:(curW-startW).toFixed(1),daysTracked:logs.length,streak,
    avgScore:(recent.reduce((s,l)=>s+calcHealthScore(l,user),0)/recent.length).toFixed(0),
    avgSleep:(recent.reduce((s,l)=>s+l.sleep,0)/recent.length).toFixed(1),
    avgWater:(recent.reduce((s,l)=>s+l.water,0)/recent.length).toFixed(1),
    avgExercise:(recent.reduce((s,l)=>s+l.exercise,0)/recent.length).toFixed(0),
    avgEnergy:energyLogs.length?(energyLogs.reduce((s,l)=>s+l.energyLevel,0)/energyLogs.length).toFixed(1):null,
    sleepGoal:Math.min(100,(recent.reduce((s,l)=>s+l.sleep,0)/recent.length/(user.sleepTarget||7.5))*100).toFixed(0),
    waterGoal:Math.min(100,(recent.reduce((s,l)=>s+l.water,0)/recent.length/2.5)*100).toFixed(0),
    exerciseGoal:Math.min(100,(recent.reduce((s,l)=>s+l.exercise,0)/recent.length/((user.weeklyExerciseTarget||150)/7))*100).toFixed(0),
  };
}

// ═════ WEEKLY SUMMARY ═════
function calcWeeklySummary(user){
  const allLogs=LOGS.filter(l=>l.userId===user.id).sort((a,b)=>a.date.localeCompare(b.date));
  if(!allLogs.length)return null;
  const today=new Date();
  const last7=new Date(today);last7.setDate(today.getDate()-7);
  const last14=new Date(today);last14.setDate(today.getDate()-14);
  const fmt=d=>d.toISOString().split('T')[0];
  const thisWeek=allLogs.filter(l=>l.date>=fmt(last7)&&l.date<=fmt(today));
  const lastWeek=allLogs.filter(l=>l.date>=fmt(last14)&&l.date<fmt(last7));
  if(!thisWeek.length)return null;
  const avg=(arr,k)=>arr.length?arr.reduce((s,x)=>s+x[k],0)/arr.length:0;
  const thisAvgW=avg(thisWeek,'weight');
  const lastAvgW=lastWeek.length?avg(lastWeek,'weight'):thisAvgW;
  const thisAvgScore=thisWeek.reduce((s,l)=>s+calcHealthScore(l,user),0)/thisWeek.length;
  const lastAvgScore=lastWeek.length?lastWeek.reduce((s,l)=>s+calcHealthScore(l,user),0)/lastWeek.length:thisAvgScore;
  const bestDay=thisWeek.reduce((b,l)=>{const s=calcHealthScore(l,user);return s>b.score?{log:l,score:s}:b;},{log:null,score:-1});
  return{
    daysLogged:thisWeek.length,daysOf:7,
    avgWeight:thisAvgW.toFixed(1),
    weightDelta:(thisAvgW-lastAvgW).toFixed(1),
    avgScore:Math.round(thisAvgScore),
    scoreDelta:Math.round(thisAvgScore-lastAvgScore),
    avgSleep:avg(thisWeek,'sleep').toFixed(1),
    avgExercise:Math.round(avg(thisWeek,'exercise')),
    bestDay:bestDay.log,bestScore:bestDay.score,
    hasComparison:lastWeek.length>0,
    weekStart:fmt(last7),weekEnd:fmt(today)
  };
}
function renderWeeklySummary(user){
  const s=calcWeeklySummary(user);if(!s)return'';
  const wDir=parseFloat(s.weightDelta);
  const wClass=user.goalType==='ลดน้ำหนัก'?(wDir<0?'down':wDir>0?'up':'neutral'):(wDir>0?'down':wDir<0?'up':'neutral');
  const sClass=s.scoreDelta>0?'down':s.scoreDelta<0?'up':'neutral';
  return `<div class="summary-card">
    <div class="flex-between" style="margin-bottom:4px"><div class="section-title" style="margin-bottom:0">🏆 สรุปสัปดาห์</div><span class="text-muted mono" style="font-size:11px">${s.weekStart} → ${s.weekEnd}</span></div>
    <div style="font-size:13px;color:var(--text2)">บันทึกข้อมูล <b style="color:var(--lime)">${s.daysLogged}/${s.daysOf}</b> วัน</div>
    <div class="summary-grid">
      <div class="summary-stat"><div class="ss-label">⚖️ น้ำหนักเฉลี่ย</div><div class="ss-value">${s.avgWeight} <span class="ss-unit">kg</span></div>${s.hasComparison?`<div class="ss-delta ${wClass}">${wDir>0?'+':''}${s.weightDelta} kg vs สัปดาห์ก่อน</div>`:'<div class="ss-delta neutral">— ยังไม่มีข้อมูลเปรียบเทียบ</div>'}</div>
      <div class="summary-stat"><div class="ss-label">⭐ คะแนนเฉลี่ย</div><div class="ss-value">${s.avgScore}<span class="ss-unit">/100</span></div>${s.hasComparison?`<div class="ss-delta ${sClass}">${s.scoreDelta>0?'+':''}${s.scoreDelta} pts</div>`:'<div class="ss-delta neutral">—</div>'}</div>
      <div class="summary-stat"><div class="ss-label">🌙 นอนเฉลี่ย</div><div class="ss-value">${s.avgSleep} <span class="ss-unit">ชม</span></div><div class="ss-delta neutral">เป้า ${user.sleepTarget||7.5} ชม</div></div>
      <div class="summary-stat"><div class="ss-label">🏃 ออกกำลังกาย</div><div class="ss-value">${s.avgExercise} <span class="ss-unit">นาที/วัน</span></div><div class="ss-delta neutral">รวม ${s.avgExercise*s.daysLogged} นาที</div></div>
    </div>
    ${s.bestDay?`<div class="card-sm" style="margin-top:12px;background:rgba(200,240,0,.06);border-color:rgba(200,240,0,.2)"><div style="font-size:11px;color:var(--lime);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">🌟 วันที่ดีที่สุด</div><div class="flex-between" style="font-size:13px"><span class="mono">${s.bestDay.date}</span><span class="fw-600">Score ${s.bestScore}/100</span></div></div>`:''}
  </div>`;
}

// ═════ WEIGHT CHART (Canvas line chart) ═════
function drawWeightChart(canvasId,logs,user){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const cssW=canvas.clientWidth||canvas.parentElement.clientWidth-32;
  const cssH=200;
  canvas.width=cssW*dpr;canvas.height=cssH*dpr;
  canvas.style.height=cssH+'px';
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,cssW,cssH);
  const recent=[...logs].sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
  if(recent.length<2){
    ctx.fillStyle='#9BA3AF';ctx.font='13px DM Sans,sans-serif';ctx.textAlign='center';
    ctx.fillText('ต้องการข้อมูลอย่างน้อย 2 วันเพื่อแสดงกราฟ',cssW/2,cssH/2);return;
  }
  const pad={top:18,right:12,bottom:24,left:38};
  const cw=cssW-pad.left-pad.right;const ch=cssH-pad.top-pad.bottom;
  const weights=recent.map(l=>l.weight);
  const targetW=user.targetWeight;
  const allVals=targetW?[...weights,targetW]:weights;
  const minV=Math.min(...allVals),maxV=Math.max(...allVals);
  const range=(maxV-minV)||1;const padR=range*0.2;
  const yMin=minV-padR,yMax=maxV+padR;const yRange=yMax-yMin;
  const xAt=i=>pad.left+(recent.length===1?cw/2:(i/(recent.length-1))*cw);
  const yAt=v=>pad.top+((yMax-v)/yRange)*ch;
  // Grid + labels
  ctx.strokeStyle='#2A2D32';ctx.lineWidth=1;
  ctx.fillStyle='#9BA3AF';ctx.font='10px JetBrains Mono,monospace';
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){
    const y=pad.top+(i/4)*ch;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillText((yMax-(i/4)*yRange).toFixed(1),pad.left-6,y);
  }
  // Target line
  if(targetW&&targetW>=yMin&&targetW<=yMax){
    const ty=yAt(targetW);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(pad.left,ty);ctx.lineTo(pad.left+cw,ty);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#FFD700';ctx.font='bold 10px DM Sans,sans-serif';
    ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText(`🎯 เป้า ${targetW}kg`,pad.left+cw-4,ty-3);
  }
  // Area gradient
  const grd=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
  grd.addColorStop(0,'rgba(200,240,0,0.35)');grd.addColorStop(1,'rgba(200,240,0,0)');
  ctx.beginPath();ctx.moveTo(xAt(0),yAt(recent[0].weight));
  for(let i=1;i<recent.length;i++)ctx.lineTo(xAt(i),yAt(recent[i].weight));
  ctx.lineTo(xAt(recent.length-1),pad.top+ch);ctx.lineTo(xAt(0),pad.top+ch);
  ctx.closePath();ctx.fillStyle=grd;ctx.fill();
  // Line
  ctx.strokeStyle='#C8F000';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();
  recent.forEach((log,i)=>{const x=xAt(i),y=yAt(log.weight);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
  ctx.stroke();
  // Dots
  const dotEvery=recent.length>14?Math.ceil(recent.length/10):1;
  recent.forEach((log,i)=>{
    if(i%dotEvery!==0&&i!==recent.length-1)return;
    const x=xAt(i),y=yAt(log.weight);
    ctx.fillStyle='#0A0A0A';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#C8F000';ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();
  });
  // Highlight latest
  const lx=xAt(recent.length-1),ly=yAt(recent[recent.length-1].weight);
  ctx.fillStyle='#C8F000';ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#0A0A0A';ctx.lineWidth=2;ctx.stroke();
  // X-axis
  ctx.fillStyle='#9BA3AF';ctx.font='9px JetBrains Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='top';
  const labelCount=Math.min(5,recent.length);
  for(let i=0;i<labelCount;i++){
    const idx=labelCount===1?0:Math.round((i/(labelCount-1))*(recent.length-1));
    ctx.fillText(recent[idx].date.slice(5),xAt(idx),pad.top+ch+6);
  }
}

// ═════ REMINDERS (Web Notifications) ═════
const REMINDER_KEY='fitfuel_reminder';
let reminderInterval=null;
let lastReminderDate=null;
function getReminderSettings(){try{return JSON.parse(localStorage.getItem(REMINDER_KEY))||{enabled:false,time:'20:00'};}catch{return{enabled:false,time:'20:00'};}}
function saveReminderSettings(s){localStorage.setItem(REMINDER_KEY,JSON.stringify(s));}
async function enableReminder(time){
  if(!('Notification' in window)){showToast('❌ เบราว์เซอร์ไม่รองรับการแจ้งเตือน');return false;}
  let perm=Notification.permission;
  if(perm==='default')perm=await Notification.requestPermission();
  if(perm!=='granted'){showToast('❌ กรุณาอนุญาตการแจ้งเตือน');return false;}
  saveReminderSettings({enabled:true,time});
  startReminderTimer();
  showToast('🔔 ตั้งแจ้งเตือนเวลา '+time+' แล้ว');
  return true;
}
function disableReminder(){const s=getReminderSettings();saveReminderSettings({...s,enabled:false});stopReminderTimer();showToast('🔕 ปิดการแจ้งเตือนแล้ว');}
function checkAndNotify(){
  const s=getReminderSettings();if(!s.enabled||!currentUser)return;
  const now=new Date();const today=now.toISOString().split('T')[0];
  const cur=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const todayLogged=LOGS.some(l=>l.userId===currentUser.id&&l.date===today);
  if(todayLogged||lastReminderDate===today)return;
  if(cur===s.time){
    lastReminderDate=today;
    try{new Notification('🔥 FitFuel - เวลาบันทึกสุขภาพ',{body:'อย่าลืมบันทึกข้อมูลสุขภาพประจำวันนี้นะ 💪',tag:'fitfuel-reminder',requireInteraction:false});}catch(e){console.error(e);}
  }
}
function startReminderTimer(){stopReminderTimer();reminderInterval=setInterval(checkAndNotify,30000);checkAndNotify();}
function stopReminderTimer(){if(reminderInterval){clearInterval(reminderInterval);reminderInterval=null;}}
function initReminders(){const s=getReminderSettings();if(s.enabled&&'Notification' in window&&Notification.permission==='granted')startReminderTimer();}
async function toggleReminder(){
  const s=getReminderSettings();
  if(s.enabled){
    disableReminder();
  } else {
    const time=document.getElementById('reminder-time')?.value||s.time||'20:00';
    await enableReminder(time);
    
    // โค้ดส่วนที่เพิ่มมา: อัปเดตเวลาลง Supabase ทันทีที่กดเปิด
    const fullTime = time + ":00";
    try {
        await supaClient
            .from('users')
            .update({ reminder_time: fullTime })
            .eq('id', currentUser.id);
    } catch(err) {
        console.error("Failed to update reminder_time", err);
    }
  }
  renderApp(currentPage);
}
async function changeReminderTime(){
  const time=document.getElementById('reminder-time').value;
  const s=getReminderSettings();
  saveReminderSettings({...s,time});
  
  if(s.enabled){
    startReminderTimer();
  }
  
  // อัปเดตเวลาลง Supabase
  const fullTime = time + ":00";
  try {
    const { error } = await supaClient
        .from('users')
        .update({ reminder_time: fullTime })
        .eq('id', currentUser.id);
        
    if(error) throw error;
    showToast('✅ บันทึกเวลาใหม่: '+time);
  } catch(err) {
    console.error(err);
    showToast('❌ เกิดข้อผิดพลาดในการบันทึกเวลา');
  }
}
async function testReminder(){
  if(!('Notification' in window)){showToast('❌ เบราว์เซอร์ไม่รองรับ');return;}
  if(Notification.permission!=='granted'){const p=await Notification.requestPermission();if(p!=='granted'){showToast('❌ กรุณาอนุญาตการแจ้งเตือน');return;}}
  new Notification('🔥 FitFuel - ทดสอบ',{body:'การแจ้งเตือนทำงานแล้ว! 🎉',tag:'fitfuel-test'});
  showToast('✅ ส่งทดสอบแล้ว');
}

async function submitLog(){
  if(!supaClient){alert("เชื่อมต่อ Database ไม่ได้");return;}
  const date=document.getElementById('log-date').value;
  const weight=parseFloat(document.getElementById('log-weight').value);
  const sleep=parseFloat(document.getElementById('log-sleep').value);
  const water=parseFloat(document.getElementById('log-water').value);
  const exercise=parseInt(document.getElementById('log-exercise').value);
  const energy=parseInt(document.getElementById('log-energy').value);
  const err=document.getElementById('log-error');const btn=document.getElementById('log-btn');
  if(!date||isNaN(weight)||isNaN(sleep)||isNaN(water)||isNaN(exercise)){err.textContent='กรุณากรอกข้อมูลให้ครบ';return;}
  if(weight<20||weight>300){err.textContent='น้ำหนักไม่ถูกต้อง';return;}
  if(sleep<0||sleep>24){err.textContent='ชั่วโมงนอนไม่ถูกต้อง';return;}
  if(water<0||water>20){err.textContent='ปริมาณน้ำไม่ถูกต้อง';return;}
  err.textContent='';btn.innerHTML='<span class="spinner"></span> กำลังบันทึก...';btn.disabled=true;
  const{data:logData,error}=await supaClient.from('daily_logs').insert([{user_id:currentUser.id,date,weight,sleep_hours:sleep,water_liters:water,exercise_minute:exercise,energy_level:energy}]).select().single();
  if(error){err.textContent='เกิดข้อผิดพลาด: '+error.message;btn.innerHTML='💾 บันทึกข้อมูล';btn.disabled=false;return;}
  const mappedLog=mapLog(logData);LOGS.push(mappedLog);
  await logActivity('create',`บันทึก Log: ${date} (${weight}kg, พลังงาน ${energy}/10)`,currentUser.id,'log');
  const recsToSave=generateRecommendations(mappedLog,currentUser,LOGS.filter(l=>l.userId===currentUser.id).sort((a,b)=>b.date.localeCompare(a.date)));
  const dbRecs=recsToSave.map(r=>({log_id:logData.id,rectype:r.title,severity:r.severity,message:r.msg,action:r.action,icon:r.icon}));
  const{data:recData}=await supaClient.from('recommendations').insert(dbRecs).select();
  if(recData)recData.forEach(r=>RECOMMENDATIONS.push(mapRec(r)));
  showToast('✅ บันทึกข้อมูลสำเร็จ!');
  setTimeout(()=>navTo('home',document.querySelectorAll('#main-nav .nav-item')[0]),600);
}

// ════════════════════════════════════════════════════════════
//  IMAGE CROPPER — REWRITTEN with getBoundingClientRect()
//  Reads ACTUAL DOM positions. NO fillStyle background hack.
//  Output is PNG (lossless, transparent edges if any).
// ════════════════════════════════════════════════════════════
let cropImg=null;
let cropX=0,cropY=0,cropScale=1,cropBaseScale=1;
let cropDragging=false,cropDragStart={x:0,y:0};

function openCropper(dataUrl){
  const overlay=document.getElementById('cropper-overlay');
  const imgEl=document.getElementById('cropper-img');
  imgEl.classList.remove('ready');
  overlay.classList.add('show');
  cropImg=new Image();
  cropImg.onload=()=>{
    imgEl.src=dataUrl;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const stage=document.getElementById('cropper-stage');
        const stageW=stage.clientWidth||stage.offsetWidth;
        cropBaseScale=Math.max(stageW/cropImg.naturalWidth,stageW/cropImg.naturalHeight);
        cropX=0;cropY=0;cropScale=1;
        document.getElementById('cropper-zoom').value=1;
        applyCropTransform();
        imgEl.classList.add('ready');
      });
    });
  };
  cropImg.src=dataUrl;
}

function applyCropTransform(){
  const imgEl=document.getElementById('cropper-img');if(!cropImg)return;
  const ts=cropBaseScale*cropScale;
  imgEl.style.width=(cropImg.naturalWidth*ts)+'px';
  imgEl.style.height=(cropImg.naturalHeight*ts)+'px';
  imgEl.style.transform=`translate(calc(-50% + ${cropX}px), calc(-50% + ${cropY}px))`;
}
function constrainCrop(){
  const stage=document.getElementById('cropper-stage');
  const stageW=stage.clientWidth;
  const ts=cropBaseScale*cropScale;
  const w=cropImg.naturalWidth*ts;const h=cropImg.naturalHeight*ts;
  const maxX=(w-stageW)/2;const maxY=(h-stageW)/2;
  cropX=Math.max(-maxX,Math.min(maxX,cropX));
  cropY=Math.max(-maxY,Math.min(maxY,cropY));
}

const _stage=document.getElementById('cropper-stage');
function onCropDown(e){cropDragging=true;const p=e.touches?e.touches[0]:e;cropDragStart={x:p.clientX-cropX,y:p.clientY-cropY};e.preventDefault();}
function onCropMove(e){if(!cropDragging)return;const p=e.touches?e.touches[0]:e;cropX=p.clientX-cropDragStart.x;cropY=p.clientY-cropDragStart.y;constrainCrop();applyCropTransform();e.preventDefault();}
function onCropUp(){cropDragging=false;}
_stage.addEventListener('mousedown',onCropDown);
window.addEventListener('mousemove',onCropMove);
window.addEventListener('mouseup',onCropUp);
_stage.addEventListener('touchstart',onCropDown,{passive:false});
window.addEventListener('touchmove',onCropMove,{passive:false});
window.addEventListener('touchend',onCropUp);
document.getElementById('cropper-zoom').addEventListener('input',e=>{cropScale=parseFloat(e.target.value);constrainCrop();applyCropTransform();});

function resetCropper(){cropX=0;cropY=0;cropScale=1;document.getElementById('cropper-zoom').value=1;applyCropTransform();}
function cancelCropper(){document.getElementById('cropper-overlay').classList.remove('show');document.getElementById('cropper-img').classList.remove('ready');cropImg=null;}

async function applyCropper(){
  if(!cropImg){showToast('❌ ไม่พบรูปภาพ');return;}
  const btn = document.getElementById('cropper-apply-btn');
  btn.innerHTML = '<span class="spinner"></span> กำลังบันทึก...'; btn.disabled = true;

  try {
    const stage = document.getElementById('cropper-stage');
    const stageW = stage.clientWidth;
    if(!stageW || !cropImg.naturalWidth) throw new Error('ขนาดยังไม่พร้อม');

    // 1. คำนวณ Scale ปัจจุบันเทียบกับรูปจริง
    const currentScale = cropBaseScale * cropScale;

    // 2. หาจุดกึ่งกลางของพื้นที่ที่จะ Crop บนรูปจริง (Natural Pixels)
    // เลื่อนจากจุดกึ่งกลางรูป ไปตามค่าการลาก (cropX, cropY) ที่เราขยับ
    const centerX = (cropImg.naturalWidth / 2) - (cropX / currentScale);
    const centerY = (cropImg.naturalHeight / 2) - (cropY / currentScale);

    // 3. หารัศมีของวงกลมที่จะตัดบนรูปจริง
    // เนื่องจากวงกลมกว้างเท่ากับ StageW รัศมีบนหน้าจอคือ StageW / 2
    const naturalRadius = (stageW / 2) / currentScale;

    // 4. เตรียม Canvas สำหรับ Output 400x400
    const OUTPUT = 400;
    const canvas = document.createElement('canvas');
    canvas.width = OUTPUT; canvas.height = OUTPUT;
    const ctx = canvas.getContext('2d');

    // พื้นหลังสีขาว
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, OUTPUT, OUTPUT);

    // 5. วาดรูปจากจุดกึ่งกลางที่เราคำนวณได้
    ctx.drawImage(
      cropImg,
      centerX - naturalRadius, centerY - naturalRadius, // จุดเริ่มต้นตัดบนรูปจริง (x, y)
      naturalRadius * 2, naturalRadius * 2,           // ขนาดกว้าง x สูง ที่จะดึงมาจากรูปจริง
      0, 0,                                          // วางที่พิกเซล 0,0 ของ Canvas
      OUTPUT, OUTPUT                                 // ยืดรูปให้เต็มขนาด 400x400
    );

    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

    // ส่งขึ้น Supabase
    const { error } = await supaClient.from('users').update({ photo: dataUrl }).eq('id', currentUser.id);
    if(error) throw error;

    // อัปเดตข้อมูลในแอป
    currentUser.photo = dataUrl;
    const u = USERS.find(x => x.id === currentUser.id); if(u) u.photo = dataUrl;
    
    await logActivity('update', 'เปลี่ยนรูปโปรไฟล์', currentUser.id, 'user');
    updateAvatar();
    showToast('✅ เปลี่ยนรูปโปรไฟล์สำเร็จ!');
    cancelCropper();
    renderApp(currentPage);
  } catch(e) {
    console.error('Crop error:', e);
    showToast('❌ ' + e.message);
  } finally {
    btn.innerHTML = 'ใช้'; btn.disabled = false;
  }
}

async function removePhoto(){

  await supaClient.from('users').update({photo:null}).eq('id',currentUser.id);
  currentUser.photo=null;
  const u=USERS.find(x=>x.id===currentUser.id);if(u)u.photo=null;
  await logActivity('update','ลบรูปโปรไฟล์',currentUser.id,'user');
  updateAvatar();showToast('🗑 ลบรูปแล้ว');renderApp('settings-info');
}
async function saveInfo(){
  const name=document.getElementById('info-name').value.trim();
  const age=parseInt(document.getElementById('info-age').value);
  const gender=document.getElementById('info-gender').value;
  const height=parseInt(document.getElementById('info-height').value);
  const target=parseFloat(document.getElementById('info-target').value);
  const goal=document.getElementById('info-goal').value;
  const sleepTarget=parseFloat(document.getElementById('info-sleep-target').value);
  const exTarget=parseInt(document.getElementById('info-ex-target').value);
  const err=document.getElementById('info-error');const btn=document.getElementById('btn-save-info');
  if(!name||!age||!gender||!height||!target||!goal||!sleepTarget||!exTarget){err.textContent='กรุณากรอกให้ครบ';return;}
  err.textContent='';btn.innerHTML='<span class="spinner"></span> กำลังบันทึก...';btn.disabled=true;
  const updates={name,age,gender,height,target_weight:target,goal_type:goal,sleep_target:sleepTarget,weekly_exercise_target:exTarget};
  await supaClient.from('users').update(updates).eq('id',currentUser.id);
  const u=USERS.find(x=>x.id===currentUser.id);
  Object.assign(u,{name,age,gender,height,targetWeight:target,goalType:goal,sleepTarget,weeklyExerciseTarget:exTarget});
  Object.assign(currentUser,{name,age,gender,height,targetWeight:target,goalType:goal,sleepTarget,weeklyExerciseTarget:exTarget});
  await logActivity('update','แก้ไขข้อมูลส่วนตัว',currentUser.id,'user');
  updateAvatar();showToast('✅ บันทึกสำเร็จ');
  setTimeout(()=>navTo('profile'),500);
}

    <p class="text-muted" style="margin-top:-10px;margin-bottom:16px">เปลี่ยน role / ลบบัญชี</p>
    ${realUsers.length===0?'<div class="empty-state"><p>ยังไม่มีผู้ใช้งานคนอื่น</p></div>':realUsers.map(u=>{const cnt=LOGS.filter(l=>l.userId===u.id).length;const photoBg=u.photo?`background-image:url('${u.photo}')`:'';
      return`<div class="card" style="margin-bottom:10px"><div class="flex-between" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0"><div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--black);flex-shrink:0;background-size:cover;background-position:center;${photoBg}">${!u.photo?u.name[0]:''}</div><div style="min-width:0;flex:1"><div class="fw-600">${u.name}</div><div class="text-muted" style="font-size:12px">${cnt} logs</div>${u.email?`<div style="font-size:11px;color:var(--blue);overflow:hidden;text-overflow:ellipsis">${u.email}</div>`:''}</div></div><span class="role-badge role-${u.role}">${u.role.toUpperCase()}</span></div><div style="display:flex;gap:6px;flex-wrap:wrap">${u.role!=='user'?`<button class="btn-sm" style="flex:1;min-width:90px" onclick="setRole('${u.id}','user')">⬇ User</button>`:''}${u.role!=='admin'?`<button class="btn-sm" style="flex:1;min-width:90px;background:var(--blue);color:white" onclick="setRole('${u.id}','admin')">⬆ Admin</button>`:''}${u.role!=='master'?`<button class="btn-sm" style="flex:1;min-width:90px;background:var(--gold);color:black" onclick="setRole('${u.id}','master')">⬆ Master</button>`:''}<button class="btn-danger" style="flex-shrink:0;padding:9px 14px" onclick="deleteUser('${u.id}')">🗑</button></div></div>`;
    }).join('')}
  `;
}
function renderMasterBackup(){
  return`${masterBackBtn()}
    <div class="section-title" style="color:var(--gold)">💾 Backup & Export</div>
    <p class="text-muted" style="margin-top:-10px;margin-bottom:20px">ดาวน์โหลดข้อมูลทั้งหมด</p>
    <div class="card">
      <div class="section-sub">Export ข้อมูลแยกหมวด</div>
      <div style="display:grid;gap:8px">
        <button class="btn-export" style="justify-content:center;padding:12px" onclick="exportAllUsersCSV()">📥 Users.csv (${USERS.length} คน)</button>
        <button class="btn-export" style="justify-content:center;padding:12px" onclick="exportAllLogsCSV()">📥 Logs.csv (${LOGS.length} รายการ)</button>
        <button class="btn-export" style="justify-content:center;padding:12px" onclick="exportActivityCSV()">📥 Activity.csv (${ACTIVITIES.length} รายการ)</button>
      </div>
    </div>
    <div class="card" style="border-color:rgba(255,71,87,.3)">
      <div class="section-sub" style="color:var(--red)">⚠ อันตราย</div>
      <button class="btn-danger" style="width:100%" onclick="resetSystem()">🗑 รีเซ็ตข้อมูลทั้งหมดใน Database</button>
    </div>
  `;
}
async function setRole(userId,newRole){
  const u=USERS.find(x=>x.id===userId);if(!u){showToast('❌ ไม่พบบัญชี');return;}
  if(!confirm(`เปลี่ยน role ของ ${u.name}\nจาก ${u.role.toUpperCase()} → ${newRole.toUpperCase()}?`))return;
  await supaClient.from('users').update({role:newRole}).eq('id',userId);
  const oldRole=u.role;u.role=newRole;
  await logActivity('role',`เปลี่ยน Role: ${u.name} (${oldRole.toUpperCase()} → ${newRole.toUpperCase()})`,userId,'user');
  showToast(`✅ ${u.name} เป็น ${newRole.toUpperCase()} แล้ว`);renderApp('roles');
}
async function deleteUser(userId){
  const u=USERS.find(x=>x.id===userId);if(!u)return;
  if(!confirm(`ลบบัญชี ${u.name} และ logs ทั้งหมด?`))return;
  await supaClient.from('users').delete().eq('id',userId);
  USERS=USERS.filter(x=>x.id!==userId);LOGS=LOGS.filter(l=>l.userId!==userId);
  await logActivity('delete',`ลบบัญชี: ${u.name}`,userId,'user');
  showToast('🗑 ลบบัญชีสำเร็จ');renderApp('roles');
}
async function resetSystem(){
  if(!confirm('⚠ รีเซ็ตข้อมูลทั้งระบบ?'))return;
  if(!confirm('แน่ใจอีกครั้ง? ข้อมูลทั้งหมดจะถูกลบ'))return;
  await supaClient.from('users').delete().neq('name','impossible_string');
  showToast('🔄 กำลังรีเซ็ต...');
  setTimeout(()=>location.reload(),1000);
}

// ═════ EXPORT ═════
function downloadCSV(filename,rows){
  const BOM='\uFEFF';
  const csv=BOM+rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}
function exportUserCSV(userId){
  const u=USERS.find(x=>x.id===userId);if(!u)return;
  const userLogs=LOGS.filter(l=>l.userId===userId).sort((a,b)=>a.date.localeCompare(b.date));
  const rows=[['FitFuel - User Report'],['ชื่อ',u.name],['Email',u.email||''],['อายุ',u.age],['เพศ',u.gender],['ส่วนสูง',u.height],['น้ำหนักเป้า',u.targetWeight||''],['เป้าหมาย',u.goalType],['สร้างบัญชี',u.createdAt],[],['── Daily Logs ──'],['วันที่','น้ำหนัก','BMI','BMI Cat','Score','นอน','น้ำ','ออกกำลังกาย','พลังงาน','บันทึกเมื่อ'],
    ...userLogs.map(l=>{const bmi=calcBMI(l.weight,u.height);return[l.date,l.weight,bmi.toFixed(1),bmiCategory(bmi).label,calcHealthScore(l,u),l.sleep,l.water,l.exercise,l.energyLevel||'-',l.createdAt||''];})
  ];
  downloadCSV(`FitFuel_${u.name}_${new Date().toISOString().split('T')[0]}.csv`,rows);
  showToast('📥 ดาวน์โหลดสำเร็จ!');
}
function exportAllUsersCSV(){
  const rows=[['FitFuel - All Users'],['Generated',new Date().toLocaleString('th-TH')],[],['ID','ชื่อ','Email','Role','อายุ','เพศ','สูง','เป้า','เป้าหมาย','Logs','AvgScore','สร้างเมื่อ'],
    ...USERS.map(u=>{const ul=LOGS.filter(l=>l.userId===u.id);const avg=ul.length?ul.reduce((s,l)=>s+calcHealthScore(l,u),0)/ul.length:0;return[u.id,u.name,u.email||'',u.role,u.age,u.gender,u.height,u.targetWeight||'',u.goalType,ul.length,avg.toFixed(0),u.createdAt||''];})
  ];
  downloadCSV(`FitFuel_All_Users_${new Date().toISOString().split('T')[0]}.csv`,rows);
  showToast('📥 ดาวน์โหลด Users.csv!');
}
function exportAllLogsCSV(){
  const rows=[['FitFuel - All Logs'],['Generated',new Date().toLocaleString('th-TH')],[],['LogID','UserID','ชื่อ','วันที่','น้ำหนัก','BMI','BMI Cat','Score','นอน','น้ำ','ออกกำลังกาย','พลังงาน','บันทึกเมื่อ'],
    ...[...LOGS].sort((a,b)=>b.date.localeCompare(a.date)).map(l=>{const u=USERS.find(x=>x.id===l.userId);if(!u)return null;const bmi=calcBMI(l.weight,u.height);return[l.id,u.id,u.name,l.date,l.weight,bmi.toFixed(1),bmiCategory(bmi).label,calcHealthScore(l,u),l.sleep,l.water,l.exercise,l.energyLevel||'-',l.createdAt||''];}).filter(Boolean)
  ];
  downloadCSV(`FitFuel_All_Logs_${new Date().toISOString().split('T')[0]}.csv`,rows);
  showToast('📥 ดาวน์โหลด Logs.csv!');
}
function exportActivityCSV(){
  const rows=[['FitFuel - Activity'],['Generated',new Date().toLocaleString('th-TH')],[],['ID','Type','Target','Message','Actor','Timestamp'],
    ...ACTIVITIES.map(a=>[a.id,a.type,a.target,a.msg,a.actorName||a.actorId,a.timestamp])
  ];
  downloadCSV(`FitFuel_Activity_${new Date().toISOString().split('T')[0]}.csv`,rows);
  showToast('📥 ดาวน์โหลด Activity.csv!');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
