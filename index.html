<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitFuel – Health Tracking Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {--lime:#C8F000;--lime-dark:#a8cc00;--gold:#FFD700;--black:#050505;--dark:#0A0A0A;--card:#121212;--card2:#1A1A1A;--border:#222222;--muted:#555A62;--text:#E8EBF0;--text2:#9BA3AF;--red:#FF4757;--orange:#FF8C42;--teal:#2DD4BF;--blue:#3B82F6;--purple:#A78BFA;--aqua:#38bdf8;--radius:16px;--radius-sm:10px}
  * {margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body {max-width:100%;overflow-x:hidden;background:var(--black);}
  body {font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
  .screen {display:none;min-height:100vh;flex-direction:column;animation:fadeIn .3s ease}
  .screen.active {display:flex}
  @keyframes fadeIn {from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)}}
  
  /* SVG Icons Base */
  .icon {width:16px;height:16px;vertical-align:middle;display:inline-block;}
  .icon-lg {width:24px;height:24px;vertical-align:middle;display:inline-block;}
  
  .splash-logo {text-align:center;padding:24px}
  .splash-logo h1 {font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:4px;color:var(--lime);line-height:1}
  .auth-wrap {max-width:420px;width:100%;margin:0 auto;padding:40px 24px 60px}
  .auth-header {margin-bottom:28px;text-align:center}
  .auth-header h2 {font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;color:var(--lime)}
  .btn {display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:var(--radius-sm);transition:all .18s ease;letter-spacing:.3px}
  .btn-primary {background:var(--lime);color:var(--black);padding:16px 24px;font-size:15px;width:100%}
  .btn-primary:hover {background:var(--lime-dark);transform:translateY(-1px)}
  .btn-primary:disabled {opacity:.5;cursor:not-allowed;transform:none}
  .btn-sm {background:var(--card2);color:var(--text);padding:9px 16px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);font-weight:600;font-family:'DM Sans'}
  .btn-danger {background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2);padding:10px 20px;font-size:13px;border-radius:8px;cursor:pointer;font-weight:600}
  .btn-export {background:rgba(200,240,0,.1);color:var(--lime);border:1px solid rgba(200,240,0,.2);padding:10px 16px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:600}
  
  .form-group {margin-bottom:14px;width:100%}
  .form-group label {display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
  .form-group input, .form-group select {width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:13px 16px;border-radius:var(--radius-sm);font-size:15px;box-sizing:border-box;max-width:100%}
  .form-group input[type=date], .form-group input[type=time] {font-family:'JetBrains Mono',monospace;text-align:left;padding:12px;font-size:14px;min-height:46px;width:100%;appearance:none;-webkit-appearance:none;position:relative}
  .form-group input[type=date]::-webkit-calendar-picker-indicator,
  .form-group input[type=time]::-webkit-calendar-picker-indicator {filter:invert(1) opacity(.6);cursor:pointer;padding:4px;flex-shrink:0}
  .form-group input:focus, .form-group select:focus {outline:none;border-color:var(--lime)}
  .form-row {display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .error-msg {color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px}
  .field-hint {font-size:11px;color:var(--text2);margin-top:5px}
  
  .pin-wrap {display:flex;gap:8px;justify-content:center;margin:8px 0;max-width:100%}
  .pin-box {width:44px;height:54px;text-align:center;font-size:22px;font-weight:600;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--lime);font-family:'JetBrains Mono'}
  .pin-box:focus {outline:none;border-color:var(--lime);background:rgba(200,240,0,0.05);}
  .pin-box.filled {border-color:var(--lime);background:rgba(200,240,0,0.05);}
  
  .topbar {display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--black);position:sticky;top:0;z-index:100}
  .topbar-logo {font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--lime)}
  .avatar {width:36px;height:36px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--black);cursor:pointer;background-size:cover;background-position:center;background-repeat:no-repeat;}
  .avatar.admin {background:var(--blue);color:white}
  .avatar.master {background:var(--gold);color:var(--black)}
  
  .role-badge {font-size:9px;padding:3px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;background:rgba(200,240,0,.15);color:var(--lime);border:1px solid rgba(200,240,0,.3)}
  .role-admin {background:rgba(59,130,246,.15);color:var(--blue);border-color:rgba(59,130,246,.3)}
  .role-master {background:rgba(255,215,0,.15);color:var(--gold);border-color:rgba(255,215,0,.3)}
  
  .mode-switch {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .mode-btn {padding:8px 14px;font-size:12px;border-radius:8px;font-weight:600;cursor:pointer;border:none}
  .mode-btn-admin {background:var(--blue);color:white}
  .mode-btn-master {background:var(--gold);color:var(--black)}
  
  .content {flex:1;overflow-y:auto;padding:20px;padding-bottom:100px}
  .bottom-nav {position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;padding:12px 0 24px;z-index:100}
  .nav-item {flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;background:none;border:none;transition:color 0.2s}
  .nav-item.active {color:var(--lime)}
  
  .card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .card-sm {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
  .settings-list {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
  .setting-item {padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;border-bottom:1px solid var(--border)}
  .setting-item:hover {background:var(--card2)}
  .setting-item:last-child {border-bottom:none}
  .setting-icon {width:36px;height:36px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;color:var(--text)}
  .setting-content {flex:1;min-width:0}
  .setting-title {font-size:14px;font-weight:600;margin-bottom:2px}
  .setting-desc {font-size:12px;color:var(--text2)}

  .metrics-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .metric-chip {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
  .metric-chip .chip-label {display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:600;}
  .metric-chip .chip-value {font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1}
  .metric-chip .chip-unit {font-size:12px;color:var(--text2);margin-top:2px;font-family:'DM Sans';text-transform:lowercase;}
  .metric-chip.lime .chip-value{color:var(--lime)} .metric-chip.teal .chip-value{color:var(--teal)}
  .metric-chip.orange .chip-value{color:var(--orange)} .metric-chip.blue .chip-value{color:var(--blue)}
  .metric-chip.purple .chip-value{color:var(--purple)} .metric-chip.aqua .chip-value{color:var(--aqua)}

  .score-mini-stats {display:flex;align-items:center;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;flex-wrap:wrap}
  .score-mini-stat {display:flex;align-items:center;gap:6px;color:var(--text2)}
  .score-mini-stat b {color:var(--text);font-weight:600;font-family:'JetBrains Mono'}

  .bmi-card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
  .bmi-number {font-family:'Bebas Neue';font-size:80px;line-height:1}
  .bmi-bar {background:var(--border);border-radius:6px;height:10px;position:relative;margin:16px 0 8px}
  .bmi-indicator {position:absolute;top:-4px;width:18px;height:18px;border-radius:50%;background:white;border:3px solid var(--black);transform:translateX(-50%);box-shadow:0 0 0 2px white}
  .progress-card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .progress-bar {background:var(--border);height:8px;border-radius:4px;overflow:hidden;margin:8px 0}
  .progress-bar-fill {height:100%;border-radius:4px}
  .progress-row {display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .streak-box {background:linear-gradient(135deg,rgba(255,140,66,.1),rgba(255,71,87,.05));border:1px solid rgba(255,140,66,.2);border-radius:var(--radius);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:20px}
  .streak-num {font-family:'Bebas Neue';font-size:48px;color:var(--orange);line-height:1}
  
  .risk-badge {display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
  .risk-low {background:rgba(200,240,0,.1);color:var(--lime);border:1px solid rgba(200,240,0,.2)}
  .risk-medium {background:rgba(255,140,66,.1);color:var(--orange);border:1px solid rgba(255,140,66,.2)}
  .risk-high {background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2)}
  
  .rec-box {background:var(--card2);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start;border:1px solid var(--border);}
  .rec-icon {width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rec-box.low .rec-icon {background:rgba(200,240,0,.1);color:var(--lime);}
  .rec-box.medium .rec-icon {background:rgba(255,140,66,.1);color:var(--orange);}
  .rec-box.high .rec-icon {background:rgba(255,71,87,.1);color:var(--red);}
  .rec-content h4 {font-size:14px;margin-bottom:4px;color:var(--text);display:flex;align-items:center;gap:6px;}
  .rec-content p {font-size:13px;color:var(--text2);line-height:1.5;}
  .rec-action {display:inline-block;margin-top:10px;font-size:12px;color:var(--text);background:var(--black);padding:6px 12px;border-radius:6px;border:1px solid var(--border);}

  .log-item {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;margin-bottom:12px}
  .log-stats {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
  .log-stat {font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;}
  .log-stat span {color:var(--text);font-weight:600;font-family:'JetBrains Mono'}
  
  .activity-item {background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
  .activity-icon {width:32px;height:32px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--lime)}
  .activity-time {font-size:11px;color:var(--text2);margin-top:6px;font-family:'JetBrains Mono'}
  
  .section-title {font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;color:var(--text);margin:24px 0 16px;display:flex;align-items:center;gap:8px;}
  .section-sub {font-size:12px;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
  .section-flex {display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px}

  .chart-card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px 16px;margin-bottom:24px}
  .chart-card .chart-head {display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 4px}
  .chart-card canvas {display:block;width:100%;height:220px}

  .summary-card {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
  .summary-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .summary-stat {background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
  .summary-stat .ss-label {display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);text-transform:uppercase;margin-bottom:8px;letter-spacing:1px;font-weight:600}
  .summary-stat .ss-value {font-family:'Bebas Neue';font-size:32px;line-height:1;color:var(--text)}
  .summary-stat .ss-delta {font-size:11px;font-family:'JetBrains Mono';margin-top:6px}
  .summary-stat .ss-delta.up {color:var(--orange)} .summary-stat .ss-delta.down {color:var(--lime)}
  .summary-stat .ss-delta.neutral {color:var(--text2)}
  .summary-stat .ss-unit {font-size:12px;color:var(--text2);font-family:'DM Sans';text-transform:lowercase;}

  .toggle-switch {position:relative;display:inline-block;width:48px;height:26px;flex-shrink:0}
  .toggle-switch input {opacity:0;width:0;height:0}
  .toggle-slider {position:absolute;cursor:pointer;inset:0;background:var(--card2);border:1px solid var(--border);border-radius:26px;transition:.3s}
  .toggle-slider:before {position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:var(--text2);border-radius:50%;transition:.3s}
  .toggle-switch input:checked + .toggle-slider {background:rgba(200,240,0,.15);border-color:var(--lime)}
  .toggle-switch input:checked + .toggle-slider:before {transform:translateX(22px);background:var(--lime)}

  .energy-slider-box {margin-top:12px}
  .energy-slider {width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--red) 0%,var(--orange) 30%,var(--lime) 60%,var(--teal) 100%);outline:none}
  .energy-slider::-webkit-slider-thumb {-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--text);cursor:pointer;border:4px solid var(--card);box-shadow:0 0 0 1px var(--border)}
  .energy-slider::-moz-range-thumb {width:24px;height:24px;border-radius:50%;background:var(--text);cursor:pointer;border:4px solid var(--card)}
  .energy-display {display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:12px;color:var(--text2)}
  .energy-value {font-family:'Bebas Neue';font-size:32px;color:var(--lime);line-height:1}
  .energy-label-text {font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .energy-info {background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.5}
  .energy-info b {color:var(--text)}

  .spinner {display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin {to {transform:rotate(360deg)}}
  .toast {position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--black);padding:14px 24px;border-radius:30px;font-weight:600;font-size:14px;opacity:0;transition:all .3s ease;z-index:9999;white-space:nowrap;max-width:88vw;text-align:center;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
  .toast.show {opacity:1;transform:translateX(-50%) translateY(0)}
  
  .profile-header {display:flex;align-items:center;gap:20px;margin-bottom:32px}
  .profile-avatar-lg {width:80px;height:80px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--black);flex-shrink:0;background-size:cover;background-position:center;background-repeat:no-repeat;position:relative;overflow:hidden;cursor:pointer;}
  .profile-avatar-lg.admin {background:var(--blue);color:white}
  .profile-avatar-lg.master {background:var(--gold);color:var(--black)}
  .profile-avatar-lg .photo-edit-overlay {position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;color:white}
  .profile-avatar-lg:hover .photo-edit-overlay {opacity:1}
  .photo-input {display:none}
  
  .subpage-header {display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .subpage-back {background:var(--card2);border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  
  .flex-between {display:flex;justify-content:space-between;align-items:center}
  .text-muted {color:var(--text2);font-size:13px}
  .fw-600 {font-weight:600}
  .mono {font-family:'JetBrains Mono',monospace}
  .empty-state {text-align:center;padding:60px 20px;color:var(--text2)}
  .empty-state .empty-icon {margin-bottom:16px;display:block;color:var(--border)}

  /* Cropper */
  .cropper-overlay {display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9998;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px)}
  .cropper-overlay.show {display:flex}
  .cropper-modal {background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:380px;max-height:95vh;overflow-y:auto}
  .cropper-modal h3 {font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;color:var(--text);margin-bottom:20px;text-align:center}
  .cropper-stage {position:relative;width:100%;aspect-ratio:1/1;background:#000;border-radius:var(--radius-sm);overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none}
  .cropper-stage:active{cursor:grabbing}
  .cropper-stage img {position:absolute;top:50%;left:50%;transform-origin:center center;pointer-events:none;user-select:none;-webkit-user-drag:none;max-width:none;opacity:0;transition:opacity .2s ease}
  .cropper-stage img.ready {opacity:1}
  .cropper-circle {position:absolute;inset:0;pointer-events:none}
  .cropper-circle::before {content:'';position:absolute;inset:0;background:rgba(0,0,0,.6);-webkit-mask:radial-gradient(circle at center,transparent 49.5%,black 50%);mask:radial-gradient(circle at center,transparent 49.5%,black 50%)}
  .cropper-circle::after {content:'';position:absolute;top:50%;left:50%;width:100%;height:100%;border-radius:50%;border:2px solid rgba(255,255,255,.5);transform:translate(-50%,-50%);}
  .cropper-zoom-row {display:flex;align-items:center;gap:16px;margin:24px 0 16px}
  .cropper-zoom-icon {color:var(--text2);flex-shrink:0}
  .cropper-zoom-slider {flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none}
  .cropper-zoom-slider::-webkit-slider-thumb {-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--card)}
  .cropper-actions {display:flex;gap:12px;margin-top:20px}
  .cropper-btn {flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans';font-weight:600;font-size:14px;cursor:pointer}
  .cropper-btn-cancel {background:var(--card2);color:var(--text);border:1px solid var(--border)}
  .cropper-btn-apply {background:var(--lime);color:var(--black)}

  input#ob-username, input#info-username {text-transform:lowercase}
  #global-loader {display:flex;position:fixed;inset:0;background:var(--black);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  @media(max-width:400px){.metrics-grid,.form-row,.summary-grid{grid-template-columns:1fr} .pin-box{width:40px;height:50px;font-size:18px} .content{padding:16px;padding-bottom:100px}}
</style>
</head>
<body>

<div id="global-loader">
  <div class="spinner" style="width:40px;height:40px;border-width:3px;border-top-color:var(--lime)"></div>
  <div style="font-size:16px;color:var(--lime);font-family:'Bebas Neue';letter-spacing:2px">CONNECTING TO DATABASE</div>
</div>

<div id="screen-splash" class="screen">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="margin-bottom:24px">

function setupPinInputs(id){
  const c=document.getElementById(id);if(!c)return;
  const inputs=c.querySelectorAll('.pin-box');
  inputs.forEach((inp,i)=>{
    inp.oninput=e=>{
        const v=e.target.value.replace(/[^0-9]/g,'');e.target.value=v;
        if(v)e.target.classList.add('filled');else e.target.classList.remove('filled');
        if(v&&i<inputs.length-1)inputs[i+1].focus();
        if(getPinValue(id).length===6){ setTimeout(()=>verifyAuthOTP(), 50); } // AUTO SUBMIT
    };
    inp.onkeydown=e=>{if(e.key==='Backspace'&&!e.target.value&&i>0){inputs[i-1].focus();inputs[i-1].value='';inputs[i-1].classList.remove('filled');}};
    inp.onpaste=e=>{
        e.preventDefault();const txt=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);
        txt.split('').forEach((c,j)=>{if(inputs[j]){inputs[j].value=c;inputs[j].classList.add('filled');}});
        if(inputs[Math.min(txt.length,inputs.length-1)])inputs[Math.min(txt.length,inputs.length-1)].focus();
        if(getPinValue(id).length===6){ setTimeout(()=>verifyAuthOTP(), 50); } // AUTO SUBMIT
    };
  });
}
const getPinValue=id=>{const c=document.getElementById(id);return c?Array.from(c.querySelectorAll('.pin-box')).map(i=>i.value).join(''):'';};
const clearPinInputs=id=>{const c=document.getElementById(id);if(c)c.querySelectorAll('.pin-box').forEach(i=>{i.value='';i.classList.remove('filled');});};

  err.textContent='';
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Invalid email format';return;}
  btn.innerHTML='<span class="spinner"></span> SENDING...';btn.disabled=true;
  const{error}=await supaClient.auth.signInWithOtp({email});
  if(error){err.textContent=error.message;btn.innerHTML='GET OTP';btn.disabled=false;}
  else{document.getElementById('display-email').textContent=email;btn.innerHTML='GET OTP';btn.disabled=false;clearPinInputs('otp-input-wrap');document.getElementById('verify-error').textContent='';showScreen('verify-otp');setTimeout(()=>document.querySelector('#otp-input-wrap .pin-box').focus(),100);}

// ═════ CALCULATIONS ═════
const calcBMI=(w,h)=>w/Math.pow(h/100,2);
function bmiCategory(bmi){
  if(bmi<18.5)return{label:'Underweight',color:'#3B82F6',risk:'low'};
  if(bmi<25)return{label:'Normal',color:'#C8F000',risk:'low'};
  if(bmi<30)return{label:'Overweight',color:'#FF8C42',risk:'medium'};
  return{label:'Obese',color:'#FF4757',risk:'high'};
}
function calcHealthScore(log,user){
  let s=100;const bmi=calcBMI(log.weight,user.height);
  if(bmi<18.5||bmi>=30)s-=25;else if(bmi>=25)s-=15;
  if(log.sleep<6)s-=20;else if(log.sleep<7)s-=10;
  if(log.water<1.5)s-=20;else if(log.water<2)s-=10;
  if(log.exercise<15)s-=20;else if(log.exercise<30)s-=10;
  return Math.max(0,s);
}
function energyInfo(level){
  if(level<=3)return{label:'Low',icon:I.trendDown,color:'#FF4757',advice:'Need more rest or recovery.'};
  if(level<=6)return{label:'Moderate',icon:I.trendUp,color:'#FF8C42',advice:'Normal energy. Light activity is fine.'};
  if(level<=8)return{label:'Good',icon:I.check,color:'#C8F000',advice:'Keep up the discipline.'};
  return{label:'Peak',icon:I.energy,color:'#2DD4BF',advice:'Perfect for heavy workouts!'};
}

function generateRecommendations(log,user,history=[]){
  const recs=[];const bmi=calcBMI(log.weight,user.height);const cat=bmiCategory(bmi);
  if(cat.risk==='high')recs.push({severity:'high',icon:I.alert,title:'BMI Obese',msg:'BMI '+bmi.toFixed(1)+' is in obese range.',action:'Target 0.5–1 kg/wk loss. -500 kcal/day + 150m exercise/wk'});
  else if(cat.risk==='medium')recs.push({severity:'medium',icon:I.info,title:'Overweight',msg:'BMI '+bmi.toFixed(1)+' is above standard.',action:'Cut simple sugars. Walk 30m after meals.'});
  else if(bmi<18.5)recs.push({severity:'medium',icon:I.info,title:'Underweight',msg:'BMI '+bmi.toFixed(1)+' is below standard.',action:'Increase protein intake + Resistance training.'});
  if(log.sleep<(user.sleepTarget||7))recs.push({severity:'high',icon:I.sleep,title:'Sleep Deficit',msg:'Slept only '+log.sleep+'h (Goal: '+(user.sleepTarget||7)+'h)',action:'Screen off 1hr before bed. Consistent schedule.'});
  if(log.water<1.5)recs.push({severity:'high',icon:I.water,title:'Severe Dehydration Risk',msg:'Drank '+log.water+' L',action:'Carry a 1L bottle. Drink every 2 hrs.'});
  else if(log.water<2)recs.push({severity:'medium',icon:I.water,title:'Increase Hydration',msg:'Drank '+log.water+' L',action:'Set 2hr reminders.'});
  const targetExDaily=user.weeklyExerciseTarget?Math.round(user.weeklyExerciseTarget/7):30;
  if(log.exercise<targetExDaily/2)recs.push({severity:'high',icon:I.exercise,title:'Low Activity',msg:'Active for '+log.exercise+'m (Avg target: '+targetExDaily+'m/d)',action:'Try a 20m brisk walk or 10m HIIT.'});
  else if(log.exercise<targetExDaily)recs.push({severity:'medium',icon:I.exercise,title:'Below Activity Goal',msg:'Active for '+log.exercise+'m',action:'Increase intensity slightly.'});
  if(log.energyLevel){
    if(log.energyLevel<=3){
      if(log.exercise>=60)recs.push({severity:'high',icon:I.alert,title:'Overtraining Risk',msg:'Energy '+log.energyLevel+'/10 + '+log.exercise+'m workout.',action:'Rest 1-2 days. Prioritize sleep & nutrition.'});
      else if(log.sleep<7)recs.push({severity:'high',icon:I.sleep,title:'Low Energy',msg:'Energy '+log.energyLevel+'/10 likely due to lack of sleep.',action:'Get 7-9h sleep + hydrate + cut afternoon caffeine.'});
      else recs.push({severity:'medium',icon:I.info,title:'Unusual Low Energy',msg:'Energy '+log.energyLevel+'/10 despite adequate sleep.',action:'Monitor stress or micronutrients.'});
    }else if(log.energyLevel>=8&&log.exercise<targetExDaily/2)recs.push({severity:'low',icon:I.energy,title:'Peak Energy!',msg:'Energy '+log.energyLevel+'/10 but only '+log.exercise+'m exercise.',action:'Great time to push harder in workouts!'});
  }
  if(history.length>=3){
    const r3=history.slice(0,3);const trend=r3[0].weight-r3[r3.length-1].weight;
    if(user.goalType==='ลดน้ำหนัก'&&trend>0)recs.push({severity:'medium',icon:I.trendUp,title:'Weight Up',msg:'+'+trend.toFixed(1)+'kg over 3 days.',action:'Review diet. Cut processed foods.'});
    else if(user.goalType==='ลดน้ำหนัก'&&trend<-0.5)recs.push({severity:'low',icon:I.check,title:'Good Progress',msg:'-'+Math.abs(trend).toFixed(1)+'kg.',action:'Ensure safe rate (max 1kg/wk).'});
  }
  if(recs.length===0)recs.push({severity:'low',icon:I.check,title:'Excellent!',msg:'All metrics are looking solid.',action:'Consistency is key.'});
  return recs;
}

function calcProgress(user){
  const logs=LOGS.filter(l=>l.userId===user.id).sort((a,b)=>a.date.localeCompare(b.date));
  if(!logs.length)return null;
  const first=logs[0],latest=logs[logs.length-1];
  const startW=first.weight,curW=latest.weight,targetW=user.targetWeight||curW;
  const td=Math.abs(targetW-startW),cd=Math.abs(targetW-curW);
  const weightPct=td>0?Math.min(100,Math.max(0,((td-cd)/td)*100)):100;
  let streak=1;
  const dates=logs.map(l=>l.date).reverse();
  let lastD=new Date(dates[0]);
  for(let i=1;i<dates.length;i++){const d=new Date(dates[i]);if(Math.round((lastD-d)/(1000*60*60*24))===1){streak++;lastD=d;}else break;}
  const recent=logs.slice(-7);
  const energyLogs=recent.filter(l=>l.energyLevel!=null);
  return{
    startWeight:startW,currentWeight:curW,targetWeight:targetW,weightPct:weightPct.toFixed(0),
    weightDelta:(curW-startW).toFixed(1),daysTracked:logs.length,streak,
    avgScore:(recent.reduce((s,l)=>s+calcHealthScore(l,user),0)/recent.length).toFixed(0),
    avgSleep:(recent.reduce((s,l)=>s+l.sleep,0)/recent.length).toFixed(1),
    avgWater:(recent.reduce((s,l)=>s+l.water,0)/recent.length).toFixed(1),
    avgExercise:(recent.reduce((s,l)=>s+l.exercise,0)/recent.length).toFixed(0),
    avgEnergy:energyLogs.length?(energyLogs.reduce((s,l)=>s+l.energyLevel,0)/energyLogs.length).toFixed(1):null,
    sleepGoal:Math.min(100,(recent.reduce((s,l)=>s+l.sleep,0)/recent.length/(user.sleepTarget||7.5))*100).toFixed(0),
    waterGoal:Math.min(100,(recent.reduce((s,l)=>s+l.water,0)/recent.length/2.5)*100).toFixed(0),
    exerciseGoal:Math.min(100,(recent.reduce((s,l)=>s+l.exercise,0)/recent.length/((user.weeklyExerciseTarget||150)/7))*100).toFixed(0),
  };
}

function calcWeeklySummary(user){
  const allLogs=LOGS.filter(l=>l.userId===user.id).sort((a,b)=>a.date.localeCompare(b.date));
  if(!allLogs.length)return null;
  const today=new Date();
  const last7=new Date(today);last7.setDate(today.getDate()-7);
  const last14=new Date(today);last14.setDate(today.getDate()-14);
  const fmt=d=>d.toISOString().split('T')[0];
  const thisWeek=allLogs.filter(l=>l.date>=fmt(last7)&&l.date<=fmt(today));
  const lastWeek=allLogs.filter(l=>l.date>=fmt(last14)&&l.date<fmt(last7));
  if(!thisWeek.length)return null;
  const avg=(arr,k)=>arr.length?arr.reduce((s,x)=>s+x[k],0)/arr.length:0;
  const thisAvgW=avg(thisWeek,'weight');
  const lastAvgW=lastWeek.length?avg(lastWeek,'weight'):thisAvgW;
  const thisAvgScore=thisWeek.reduce((s,l)=>s+calcHealthScore(l,user),0)/thisWeek.length;
  const lastAvgScore=lastWeek.length?lastWeek.reduce((s,l)=>s+calcHealthScore(l,user),0)/lastWeek.length:thisAvgScore;
  const bestDay=thisWeek.reduce((b,l)=>{const s=calcHealthScore(l,user);return s>b.score?{log:l,score:s}:b;},{log:null,score:-1});
  return{
    daysLogged:thisWeek.length,daysOf:7,
    avgWeight:thisAvgW.toFixed(1),
    weightDelta:(thisAvgW-lastAvgW).toFixed(1),
    avgScore:Math.round(thisAvgScore),
    scoreDelta:Math.round(thisAvgScore-lastAvgScore),
    avgSleep:avg(thisWeek,'sleep').toFixed(1),
    avgExercise:Math.round(avg(thisWeek,'exercise')),
    bestDay:bestDay.log,bestScore:bestDay.score,
    hasComparison:lastWeek.length>0,
    weekStart:fmt(last7),weekEnd:fmt(today)
  };
}

function renderWeeklySummary(user){
  const s=calcWeeklySummary(user);if(!s)return'';
  const wDir=parseFloat(s.weightDelta);
  const wClass=user.goalType==='ลดน้ำหนัก'?(wDir<0?'down':wDir>0?'up':'neutral'):(wDir>0?'down':wDir<0?'up':'neutral');
  const sClass=s.scoreDelta>0?'down':s.scoreDelta<0?'up':'neutral';
  return `<div class="summary-card">
    <div class="flex-between" style="margin-bottom:4px"><div class="section-title" style="margin-bottom:0">${I.check} WEEKLY SUMMARY</div><span class="text-muted mono" style="font-size:11px">${s.weekStart} → ${s.weekEnd}</span></div>
    <div style="font-size:13px;color:var(--text2)">Logged <b style="color:var(--lime)">${s.daysLogged}/${s.daysOf}</b> days</div>
    <div class="summary-grid">
      <div class="summary-stat"><div class="ss-label">${I.weight} Avg Weight</div><div class="ss-value">${s.avgWeight} <span class="ss-unit">kg</span></div>${s.hasComparison?`<div class="ss-delta ${wClass}">${wDir>0?'+':''}${s.weightDelta} kg vs last wk</div>`:'<div class="ss-delta neutral">—</div>'}</div>
      <div class="summary-stat"><div class="ss-label">${I.star} Avg Score</div><div class="ss-value">${s.avgScore}<span class="ss-unit">/100</span></div>${s.hasComparison?`<div class="ss-delta ${sClass}">${s.scoreDelta>0?'+':''}${s.scoreDelta} pts</div>`:'<div class="ss-delta neutral">—</div>'}</div>
      <div class="summary-stat"><div class="ss-label">${I.sleep} Avg Sleep</div><div class="ss-value">${s.avgSleep} <span class="ss-unit">h</span></div><div class="ss-delta neutral">Target ${user.sleepTarget||7.5} h</div></div>
      <div class="summary-stat"><div class="ss-label">${I.exercise} Exercise</div><div class="ss-value">${s.avgExercise} <span class="ss-unit">m/d</span></div><div class="ss-delta neutral">Total ${s.avgExercise*s.daysLogged} m</div></div>
    </div>
    ${s.bestDay?`<div class="card-sm" style="margin-top:12px;background:rgba(200,240,0,.05);border-color:rgba(200,240,0,.1)"><div style="font-size:11px;color:var(--lime);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${I.star} BEST DAY</div><div class="flex-between" style="font-size:13px"><span class="mono">${s.bestDay.date}</span><span class="fw-600">Score ${s.bestScore}/100</span></div></div>`:''}
  </div>`;
}

function drawWeightChart(canvasId,logs,user){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const cssW=canvas.clientWidth||canvas.parentElement.clientWidth-32;
  const cssH=220;
  canvas.width=cssW*dpr;canvas.height=cssH*dpr;
  canvas.style.height=cssH+'px';
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,cssW,cssH);
  const recent=[...logs].sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
  if(recent.length<2){
    ctx.fillStyle='#9BA3AF';ctx.font='13px DM Sans,sans-serif';ctx.textAlign='center';
    ctx.fillText('Not enough data (min 2 days)',cssW/2,cssH/2);return;
  }
  const pad={top:18,right:12,bottom:24,left:38};
  const cw=cssW-pad.left-pad.right;const ch=cssH-pad.top-pad.bottom;
  const weights=recent.map(l=>l.weight);
  const targetW=user.targetWeight;
  const allVals=targetW?[...weights,targetW]:weights;
  const minV=Math.min(...allVals),maxV=Math.max(...allVals);
  const range=(maxV-minV)||1;const padR=range*0.2;
  const yMin=minV-padR,yMax=maxV+padR;const yRange=yMax-yMin;
  const xAt=i=>pad.left+(recent.length===1?cw/2:(i/(recent.length-1))*cw);
  const yAt=v=>pad.top+((yMax-v)/yRange)*ch;
  ctx.strokeStyle='#2A2D32';ctx.lineWidth=1;
  ctx.fillStyle='#555A62';ctx.font='10px JetBrains Mono,monospace';
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){
    const y=pad.top+(i/4)*ch;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillText((yMax-(i/4)*yRange).toFixed(1),pad.left-6,y);
  }
  if(targetW&&targetW>=yMin&&targetW<=yMax){
    const ty=yAt(targetW);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(pad.left,ty);ctx.lineTo(pad.left+cw,ty);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#FFD700';ctx.font='bold 10px DM Sans,sans-serif';
    ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText(`TARGET ${targetW}kg`,pad.left+cw-4,ty-3);
  }
  const grd=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
  grd.addColorStop(0,'rgba(200,240,0,0.2)');grd.addColorStop(1,'rgba(200,240,0,0)');
  ctx.beginPath();ctx.moveTo(xAt(0),yAt(recent[0].weight));
  for(let i=1;i<recent.length;i++)ctx.lineTo(xAt(i),yAt(recent[i].weight));
  ctx.lineTo(xAt(recent.length-1),pad.top+ch);ctx.lineTo(xAt(0),pad.top+ch);
  ctx.closePath();ctx.fillStyle=grd;ctx.fill();
  ctx.strokeStyle='#C8F000';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();
  recent.forEach((log,i)=>{const x=xAt(i),y=yAt(log.weight);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
  ctx.stroke();
  const dotEvery=recent.length>14?Math.ceil(recent.length/10):1;
  recent.forEach((log,i)=>{
    if(i%dotEvery!==0&&i!==recent.length-1)return;
    const x=xAt(i),y=yAt(log.weight);
    ctx.fillStyle='#050505';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#C8F000';ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();
  });
  const lx=xAt(recent.length-1),ly=yAt(recent[recent.length-1].weight);
  ctx.fillStyle='#C8F000';ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#050505';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#555A62';ctx.font='9px JetBrains Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='top';
  const labelCount=Math.min(5,recent.length);
  for(let i=0;i<labelCount;i++){
    const idx=labelCount===1?0:Math.round((i/(labelCount-1))*(recent.length-1));
    ctx.fillText(recent[idx].date.slice(5),xAt(idx),pad.top+ch+6);
  }
}

// ═════ REMINDERS ═════
const REMINDER_KEY='fitfuel_reminder';
let reminderInterval=null;
let lastReminderDate=null;
function getReminderSettings(){try{return JSON.parse(localStorage.getItem(REMINDER_KEY))||{enabled:false,time:'20:00'};}catch{return{enabled:false,time:'20:00'};}}
function saveReminderSettings(s){localStorage.setItem(REMINDER_KEY,JSON.stringify(s));}
async function enableReminder(time){
  if(!('Notification' in window)){showToast('Notifications unsupported');return false;}
  let perm=Notification.permission;
  if(perm==='default')perm=await Notification.requestPermission();
  if(perm!=='granted'){showToast('Please allow notifications');return false;}
  saveReminderSettings({enabled:true,time});
  startReminderTimer();
  showToast('Reminder set for '+time);
  return true;
}
function disableReminder(){const s=getReminderSettings();saveReminderSettings({...s,enabled:false});stopReminderTimer();showToast('Reminders disabled');}
function checkAndNotify(){
  const s=getReminderSettings();if(!s.enabled||!currentUser)return;
  const now=new Date();const today=now.toISOString().split('T')[0];
  const cur=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const todayLogged=LOGS.some(l=>l.userId===currentUser.id&&l.date===today);
  if(todayLogged||lastReminderDate===today)return;
  if(cur===s.time){
    lastReminderDate=today;
    try{new Notification('FITFUEL - Time to Log!',{body:'Stay on track! Update your daily metrics.',tag:'fitfuel-reminder',requireInteraction:false});}catch(e){console.error(e);}
  }
}
function startReminderTimer(){stopReminderTimer();reminderInterval=setInterval(checkAndNotify,30000);checkAndNotify();}
function stopReminderTimer(){if(reminderInterval){clearInterval(reminderInterval);reminderInterval=null;}}
function initReminders(){const s=getReminderSettings();if(s.enabled&&'Notification' in window&&Notification.permission==='granted')startReminderTimer();}
async function toggleReminder(){
  const s=getReminderSettings();
  if(s.enabled){disableReminder();} 
  else {
    const time=document.getElementById('reminder-time')?.value||s.time||'20:00';
    await enableReminder(time);
    const fullTime = time + ":00";
    try { await supaClient.from('users').update({ reminder_time: fullTime }).eq('id', currentUser.id); } catch(err) { console.error(err); }
  }
  renderApp(currentPage);
}
async function changeReminderTime(){
  const time=document.getElementById('reminder-time').value;
  const s=getReminderSettings();saveReminderSettings({...s,time});
  if(s.enabled) startReminderTimer();
  const fullTime = time + ":00";
  try {
    const { error } = await supaClient.from('users').update({ reminder_time: fullTime }).eq('id', currentUser.id);
    if(error) throw error;
    showToast('Time updated to '+time);
  } catch(err) { console.error(err); }
}
async function testReminder(){
  if(!('Notification' in window)){showToast('Unsupported');return;}
  if(Notification.permission!=='granted'){const p=await Notification.requestPermission();if(p!=='granted'){showToast('Allow notifications first');return;}}
  new Notification('FITFUEL Test',{body:'Notifications are working!',tag:'fitfuel-test'});
  showToast('Test sent');
}

// ═════ RENDER FRAMEWORK ═════
function renderApp(page){
  currentPage=page;renderNav();
  const el=document.getElementById('main-content');
  if(currentView==='user'){
    if(page==='home')el.innerHTML=renderUserHome();
    else if(page==='log')el.innerHTML=renderUserLog();
    else if(page==='progress')el.innerHTML=renderUserProgress();

async function submitLog(){
  if(!supaClient){alert("No DB Connection");return;}
  const date=document.getElementById('log-date').value;
  const weight=parseFloat(document.getElementById('log-weight').value);
  const sleep=parseFloat(document.getElementById('log-sleep').value);
  const water=parseFloat(document.getElementById('log-water').value);
  const exercise=parseInt(document.getElementById('log-exercise').value);
  const energy=parseInt(document.getElementById('log-energy').value);
  const err=document.getElementById('log-error');const btn=document.getElementById('log-btn');
  if(!date||isNaN(weight)||isNaN(sleep)||isNaN(water)||isNaN(exercise)){err.textContent='Please fill all data';return;}
  if(weight<20||weight>300||sleep<0||sleep>24||water<0||water>20){err.textContent='Invalid input values';return;}
  err.textContent='';btn.innerHTML='<span class="spinner"></span> SAVING...';btn.disabled=true;
  const{data:logData,error}=await supaClient.from('daily_logs').insert([{user_id:currentUser.id,date,weight,sleep_hours:sleep,water_liters:water,exercise_minute:exercise,energy_level:energy}]).select().single();
  if(error){err.textContent=error.message;btn.innerHTML='Save Log';btn.disabled=false;return;}
  const mappedLog=mapLog(logData);LOGS.push(mappedLog);
  await logActivity('create',`Logged data: ${date} (${weight}kg, Energy ${energy}/10)`,currentUser.id,'log');
  const recsToSave=generateRecommendations(mappedLog,currentUser,LOGS.filter(l=>l.userId===currentUser.id).sort((a,b)=>b.date.localeCompare(a.date)));
  const dbRecs=recsToSave.map(r=>({log_id:logData.id,rectype:r.title,severity:r.severity,message:r.msg,action:r.action,icon:r.icon}));
  const{data:recData}=await supaClient.from('recommendations').insert(dbRecs).select();
  if(recData)recData.forEach(r=>RECOMMENDATIONS.push(mapRec(r)));
  showToast('Log Saved!');
  setTimeout(()=>navTo('home',document.querySelectorAll('#main-nav .nav-item')[0]),600);
}

// ═════ PHOTO UPLOAD & CROPPER ═════
document.getElementById('photo-input').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  if(!file.type.startsWith('image/')){showToast('Please select an image file');return;}
  if(file.size>10*1024*1024){showToast('File too large (max 10MB)');return;}
  const reader=new FileReader();
  reader.onload=ev=>openCropper(ev.target.result);
  reader.readAsDataURL(file);
  e.target.value='';
});

let cropImg=null;
let cropX=0,cropY=0,cropScale=1,cropBaseScale=1;
let cropDragging=false,cropDragStart={x:0,y:0};

function openCropper(dataUrl){
  const overlay=document.getElementById('cropper-overlay');
  const imgEl=document.getElementById('cropper-img');
  imgEl.classList.remove('ready');
  overlay.classList.add('show');
  cropImg=new Image();
  cropImg.onload=()=>{
    imgEl.src=dataUrl;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const stage=document.getElementById('cropper-stage');
        const stageW=stage.clientWidth||stage.offsetWidth;
        cropBaseScale=Math.max(stageW/cropImg.naturalWidth,stageW/cropImg.naturalHeight);
        cropX=0;cropY=0;cropScale=1;
        document.getElementById('cropper-zoom').value=1;
        applyCropTransform();
        imgEl.classList.add('ready');
      });
    });
  };
  cropImg.src=dataUrl;
}

function applyCropTransform(){
  const imgEl=document.getElementById('cropper-img');if(!cropImg)return;
  const ts=cropBaseScale*cropScale;
  imgEl.style.width=(cropImg.naturalWidth*ts)+'px';
  imgEl.style.height=(cropImg.naturalHeight*ts)+'px';
  imgEl.style.transform=`translate(calc(-50% + ${cropX}px), calc(-50% + ${cropY}px))`;
}
function constrainCrop(){
  const stage=document.getElementById('cropper-stage');
  const stageW=stage.clientWidth;
  const ts=cropBaseScale*cropScale;
  const w=cropImg.naturalWidth*ts;const h=cropImg.naturalHeight*ts;
  const maxX=(w-stageW)/2;const maxY=(h-stageW)/2;
  cropX=Math.max(-maxX,Math.min(maxX,cropX));
  cropY=Math.max(-maxY,Math.min(maxY,cropY));
}

const _stage=document.getElementById('cropper-stage');
function onCropDown(e){cropDragging=true;const p=e.touches?e.touches[0]:e;cropDragStart={x:p.clientX-cropX,y:p.clientY-cropY};e.preventDefault();}
function onCropMove(e){if(!cropDragging)return;const p=e.touches?e.touches[0]:e;cropX=p.clientX-cropDragStart.x;cropY=p.clientY-cropDragStart.y;constrainCrop();applyCropTransform();e.preventDefault();}
function onCropUp(){cropDragging=false;}
_stage.addEventListener('mousedown',onCropDown);
window.addEventListener('mousemove',onCropMove);
window.addEventListener('mouseup',onCropUp);
_stage.addEventListener('touchstart',onCropDown,{passive:false});
window.addEventListener('touchmove',onCropMove,{passive:false});
window.addEventListener('touchend',onCropUp);
document.getElementById('cropper-zoom').addEventListener('input',e=>{cropScale=parseFloat(e.target.value);constrainCrop();applyCropTransform();});

function cancelCropper(){document.getElementById('cropper-overlay').classList.remove('show');document.getElementById('cropper-img').classList.remove('ready');cropImg=null;}

async function applyCropper(){
  if(!cropImg){showToast('No image');return;}
  const btn = document.getElementById('cropper-apply-btn');
  btn.innerHTML = '<span class="spinner"></span> SAVING'; btn.disabled = true;
  try {
    const stage = document.getElementById('cropper-stage');
    const imgEl = document.getElementById('cropper-img');
    const stageW = stage.clientWidth;
    const rect = imgEl.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const relativeX = rect.left - stageRect.left;
    const relativeY = rect.top - stageRect.top;
    const OUTPUT = 400; 
    const ratio = OUTPUT / stageW; 
    const canvas = document.createElement('canvas');
    canvas.width = OUTPUT; canvas.height = OUTPUT;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, OUTPUT, OUTPUT);
    const finalDrawX = relativeX * ratio;
    const finalDrawY = relativeY * ratio;
    const finalDrawW = rect.width * ratio;
    const finalDrawH = rect.height * ratio;
    ctx.drawImage(cropImg, finalDrawX, finalDrawY, finalDrawW, finalDrawH);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    const { error } = await supaClient.from('users').update({ photo: dataUrl }).eq('id', currentUser.id);
    if(error) throw error;
    currentUser.photo = dataUrl;
    const u = USERS.find(x => x.id === currentUser.id); 
    if(u) u.photo = dataUrl;
    await logActivity('update', 'Updated Profile Photo', currentUser.id, 'user');
    updateAvatar();
    showToast('Profile photo updated!');
    cancelCropper();
    renderApp(currentPage);
  } catch(e) {
    console.error(e);showToast(e.message);
  } finally {
    btn.innerHTML = 'APPLY'; btn.disabled = false;
  }
}

async function saveInfo(){
  const username=document.getElementById('info-username').value.trim().toLowerCase();
  const name=document.getElementById('info-name').value.trim();
  const age=parseInt(document.getElementById('info-age').value);
  const gender=document.getElementById('info-gender').value;
  const height=parseInt(document.getElementById('info-height').value);
  const target=parseFloat(document.getElementById('info-target').value);
  const goal=document.getElementById('info-goal').value;
  const sleepTarget=parseFloat(document.getElementById('info-sleep-target').value);
  const exTarget=parseInt(document.getElementById('info-ex-target').value);
  const err=document.getElementById('info-error');const btn=document.getElementById('btn-save-info');
  if(!name||!age||!gender||!height||!target||!goal||!sleepTarget||!exTarget){err.textContent='Please fill all fields';return;}
  err.textContent='';btn.innerHTML='<span class="spinner"></span> SAVING...';btn.disabled=true;
  const updates={username:username||null,name,age,gender,height,target_weight:target,goal_type:goal,sleep_target:sleepTarget,weekly_exercise_target:exTarget};
  const{error:saveErr}=await supaClient.from('users').update(updates).eq('id',currentUser.id);
  if(saveErr){
    if(saveErr.code==='23505')err.textContent='Username taken';else err.textContent=saveErr.message;
    btn.innerHTML='SAVE CHANGES';btn.disabled=false;return;
  }
  const u=USERS.find(x=>x.id===currentUser.id);
  Object.assign(u,{username,name,age,gender,height,targetWeight:target,goalType:goal,sleepTarget,weeklyExerciseTarget:exTarget});
  Object.assign(currentUser,{username,name,age,gender,height,targetWeight:target,goalType:goal,sleepTarget,weeklyExerciseTarget:exTarget});
  await logActivity('update','Updated profile info',currentUser.id,'user');
  updateAvatar();showToast('Saved successfully');
  setTimeout(()=>navTo('profile'),500);
}

      <div style="display:grid;gap:12px">
        <button class="btn-export" style="justify-content:center;padding:14px" onclick="exportAllUsersCSV()">${I.download} Users.csv (${USERS.length})</button>
        <button class="btn-export" style="justify-content:center;padding:14px" onclick="exportAllLogsCSV()">${I.download} Logs.csv (${LOGS.length})</button>
        <button class="btn-export" style="justify-content:center;padding:14px" onclick="exportActivityCSV()">${I.download} Activity.csv (${ACTIVITIES.length})</button>
      </div>
    </div>
    <div class="card" style="border-color:rgba(255,71,87,.3)">
      <div class="section-sub" style="color:var(--red)">DANGER ZONE</div>
      <button class="btn-danger" style="width:100%;padding:14px" onclick="resetSystem()">${I.delete} Factory Reset DB</button>
    </div>
  `;
}
async function setRole(userId,newRole){
  const u=USERS.find(x=>x.id===userId);if(!u)return;
  if(!confirm(`Change role of ${u.name} to ${newRole.toUpperCase()}?`))return;
  await supaClient.from('users').update({role:newRole}).eq('id',userId);
  const oldRole=u.role;u.role=newRole;
  await logActivity('role',`Role change: ${u.name} (${oldRole.toUpperCase()} -> ${newRole.toUpperCase()})`,userId,'user');
  showToast('Role updated');renderApp('roles');
}
async function deleteUser(userId){
  const u=USERS.find(x=>x.id===userId);if(!u)return;
  if(!confirm(`Delete ${u.name} completely?`))return;
  await supaClient.from('users').delete().eq('id',userId);
  USERS=USERS.filter(x=>x.id!==userId);LOGS=LOGS.filter(l=>l.userId!==userId);
  await logActivity('delete',`Deleted user: ${u.name}`,userId,'user');
  showToast('User deleted');renderApp('roles');
}
async function resetSystem(){
  if(!confirm('FACTORY RESET: Wipe all data?'))return;
  if(!confirm('Are you absolutely sure?'))return;
  await supaClient.from('users').delete().neq('name','impossible');
  showToast('Resetting...');
  setTimeout(()=>location.reload(),1000);
}

// ═════ CSV EXPORTS ═════
function downloadCSV(filename,rows){
  const BOM='\uFEFF';
  const csv=BOM+rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}
function exportUserCSV(userId){
  const u=USERS.find(x=>x.id===userId);if(!u)return;
  const userLogs=LOGS.filter(l=>l.userId===userId).sort((a,b)=>a.date.localeCompare(b.date));
  const rows=[['FitFuel - User Report'],['Name',u.name],['Email',u.email||''],['Age',u.age],['Gender',u.gender],['Height',u.height],['Target',u.targetWeight||''],['Goal',u.goalType],['Joined',u.createdAt],[],['── Daily Logs ──'],['Date','Weight','BMI','BMI Cat','Score','Sleep','Water','Exercise','Energy','Logged At'],
    ...userLogs.map(l=>{const bmi=calcBMI(l.weight,u.height);return[l.date,l.weight,bmi.toFixed(1),bmiCategory(bmi).label,calcHealthScore(l,u),l.sleep,l.water,l.exercise,l.energyLevel||'-',l.createdAt||''];})
  ];
  downloadCSV(`FitFuel_${u.name}_${new Date().toISOString().split('T')[0]}.csv`,rows);
  showToast('Download started');
}
function exportAllUsersCSV(){
  const rows=[['FitFuel - All Users'],['Generated',new Date().toLocaleString('en-US')],[],['ID','Name','Email','Role','Age','Gender','Height','Target','Goal','LogsCount','AvgScore','Joined'],
    ...USERS.map(u=>{const ul=LOGS.filter(l=>l.userId===u.id);const avg=ul.length?ul.reduce((s,l)=>s+calcHealthScore(l,u),0)/ul.length:0;return[u.id,u.name,u.email||'',u.role,u.age,u.gender,u.height,u.targetWeight||'',u.goalType,ul.length,avg.toFixed(0),u.createdAt||''];})
  ];
  downloadCSV(`FitFuel_Users.csv`,rows);showToast('Download started');
}
function exportAllLogsCSV(){
  const rows=[['FitFuel - All Logs'],['Generated',new Date().toLocaleString('en-US')],[],['LogID','UserID','Name','Date','Weight','BMI','BMI Cat','Score','Sleep','Water','Exercise','Energy','Logged At'],
    ...[...LOGS].sort((a,b)=>b.date.localeCompare(a.date)).map(l=>{const u=USERS.find(x=>x.id===l.userId);if(!u)return null;const bmi=calcBMI(l.weight,u.height);return[l.id,u.id,u.name,l.date,l.weight,bmi.toFixed(1),bmiCategory(bmi).label,calcHealthScore(l,u),l.sleep,l.water,l.exercise,l.energyLevel||'-',l.createdAt||''];}).filter(Boolean)
  ];
  downloadCSV(`FitFuel_Logs.csv`,rows);showToast('Download started');
}
function exportActivityCSV(){
  const rows=[['FitFuel - Activity Log'],['Generated',new Date().toLocaleString('en-US')],[],['ID','Type','Target','Message','Actor','Timestamp'],
    ...ACTIVITIES.map(a=>[a.id,a.type,a.target,a.msg,a.actorName||a.actorId,a.timestamp])
  ];
  downloadCSV(`FitFuel_Activity.csv`,rows);showToast('Download started');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
